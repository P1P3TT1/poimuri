<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>[DEV] POIMURI – marjametsän match 3</title>
<style>
  :root{
    --bg-deep:#15241b;
    --bg-moss:#1d2f23;
    --board:#243a2b;
    --cell:#2c4634;
    --cell-alt:#2a4231;
    --cream:#f2edde;
    --cream-dim:#c9c4b0;
    --gold:#e5b954;
    --berry-red:#c8443c;
    --blue:#6b7fc4;
    --shadow:rgba(0,0,0,.45);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{ height:100%; }

  body{
    font-family:"Manrope","Segoe UI",system-ui,sans-serif;
    background:
      radial-gradient(1200px 700px at 50% -10%, #27402e 0%, transparent 60%),
      var(--bg-deep);
    color:var(--cream);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100%;
    padding:18px 12px 28px;
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    overflow-x:hidden;
  }

  /* ---------- Header ---------- */
  header{ text-align:center; margin-bottom:8px; user-select:none; }

  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700;
    font-size:clamp(2rem, 7vw, 2.9rem);
    letter-spacing:.22em;
    color:var(--gold);
    text-shadow:0 2px 0 rgba(0,0,0,.35);
  }
  h1 .leaf{ color:#7fae6f; font-size:.6em; vertical-align:.35em; letter-spacing:0; }

  .tagline{
    margin-top:2px;
    font-size:.85rem;
    color:var(--cream-dim);
    letter-spacing:.06em;
  }

  /* ---------- Stats ---------- */
  .stats{
    display:flex;
    gap:10px;
    margin-bottom:6px;
    width:min(92vw, 460px);
    position:sticky;
    top:6px;
    z-index:9;
  }
  .stats .stat{
    background:rgba(26,44,32,.94);
    backdrop-filter:blur(4px);
    box-shadow:0 3px 10px rgba(0,0,0,.35);
  }
  .stat.inv{
    flex:none;
    font:inherit;
    color:var(--cream);
    cursor:pointer;
    padding:8px 10px 9px;
    border:1px solid #35543e;
    min-width:58px;
  }
  .stat.inv .value{ font-size:.95rem; letter-spacing:.02em; white-space:nowrap; }
  .stat.inv.hidden{ display:none; }
  .inv-count{
    font-size:.7rem;
    color:var(--cream-dim);
  }
  .stat{
    flex:1;
    position:relative;
    background:var(--bg-moss);
    border:1px solid #35543e;
    border-radius:12px;
    padding:8px 6px 9px;
    text-align:center;
    box-shadow:0 3px 8px var(--shadow);
  }
  .stat .label{
    font-size:.66rem;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:var(--cream-dim);
  }
  .stat .value{
    font-size:1.35rem;
    font-weight:800;
    font-variant-numeric:tabular-nums;
    margin-top:1px;
  }
  .stat .value.moves-low{ color:var(--berry-red); animation:lowPulse 1s ease-in-out infinite; }
  @keyframes lowPulse{ 50%{ opacity:.55; } }

  .dmgfloat{
    position:absolute;
    right:8px; top:4px;
    font-size:.8rem;
    font-weight:800;
    color:#8fd08a;
    pointer-events:none;
    animation:plusFloat .9s ease-out forwards;
  }
  @keyframes plusFloat{
    0%{ opacity:0; transform:translateY(6px); }
    20%{ opacity:1; }
    100%{ opacity:0; transform:translateY(-14px); }
  }

  /* ---------- Taival: tasot ja tavoitteet ---------- */

  #hudrow{
    flex:none;
    display:flex;
    flex-wrap:nowrap;
    align-items:center;
    gap:10px;
    width:fit-content;
    max-width:min(92vw, 460px);
    margin:0 auto 8px;
    overflow-x:auto;
    scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
  }
  #hudrow::-webkit-scrollbar{ display:none; }
  #hudrow:not(:has(> :not(.hidden))){ display:none; }
  .goals{
    flex:none;
    display:flex;
    flex-wrap:nowrap;
    gap:8px;
  }
  .goals .chip{ flex:none; }
  .goals.perks .chip{
    font:inherit;
    font-size:.9rem;
    cursor:pointer;
    padding:4px 8px;
  }
  .goals.perks .chip b{
    font-size:.68rem;
    color:var(--cream-dim);
    margin-left:2px;
  }
  .goals.hidden{ display:none; }
  .goals .chip{
    display:flex;
    align-items:center;
    gap:4px;
    background:var(--bg-moss);
    border:1px solid #35543e;
    border-radius:999px;
    padding:4px 12px 4px 6px;
    font-weight:800;
    font-size:.9rem;
    font-variant-numeric:tabular-nums;
  }
  .goals .chip.done{ border-color:var(--gold); color:var(--gold); }
  .goals .ci{ width:22px; height:22px; display:inline-block; }
  .goals .ci svg{ width:100%; height:100%; display:block; }

  .mosscell{
    position:absolute;
    border-radius:10px;
    z-index:1;
    pointer-events:none;
    background:
      radial-gradient(circle at 30% 30%, #5c8046 0 22%, transparent 23%),
      radial-gradient(circle at 72% 38%, #69904f 0 18%, transparent 19%),
      radial-gradient(circle at 45% 72%, #557a41 0 24%, transparent 25%),
      #4a6b3a;
    box-shadow:inset 0 0 0 2px rgba(30,45,25,.55);
  }
  .mosscell.m2{ filter:brightness(.72) saturate(1.15); box-shadow:inset 0 0 0 3px rgba(18,30,14,.75); }
  .mosscell.grow{ animation:mossGrow .5s ease; }
  @keyframes mossGrow{ from{ transform:scale(.2); opacity:0; } }

  .tile .ice{
    position:absolute;
    inset:5%;
    border-radius:10px;
    z-index:2;
    pointer-events:none;
    background:linear-gradient(135deg, rgba(212,236,255,.5), rgba(140,190,230,.3) 55%, rgba(224,242,255,.5));
    border:2px solid rgba(222,242,255,.7);
    box-shadow:inset 0 0 8px rgba(255,255,255,.45);
  }
  .tile .ice::after{
    content:"❄";
    position:absolute;
    right:7%; top:1%;
    font-size:.85rem;
    color:rgba(242,250,255,.9);
    text-shadow:0 1px 2px rgba(40,80,120,.5);
  }
  .tile.deny svg:first-child{ animation:denyShake .3s ease; }
  @keyframes denyShake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-9%); }
    60%{ transform:translateX(8%); }
  }

  /* ---------- Board ---------- */
  .board-wrap{ position:relative; width:min(92vw, 460px); }

  .board{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:var(--board);
    border:1px solid #3a5a44;
    border-radius:16px;
    box-shadow:0 10px 30px var(--shadow), inset 0 0 0 6px rgba(0,0,0,.12);
    overflow:hidden;
    touch-action:none;
  }

  .cellbg{
    position:absolute;
    border-radius:10px;
    background:var(--cell);
  }
  .cellbg.alt{ background:var(--cell-alt); }

  .tile{
    position:absolute;
    left:0; top:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    will-change:transform;
    transition:transform .22s cubic-bezier(.3,.9,.4,1.1);
    z-index:2;
  }
  .tile svg{
    width:78%; height:78%;
    filter:drop-shadow(0 2px 2px rgba(0,0,0,.35));
    pointer-events:none;
  }
  .tile.selected{ z-index:3; }
  .tile.selected svg:first-child{
    transform:scale(1.14);
    filter:drop-shadow(0 0 8px rgba(229,185,84,.9)) drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  .tile.falling{ transition:transform .3s cubic-bezier(.35,.1,.55,1.25); }
  .tile.pop{
    transition:transform .22s ease-in, opacity .22s ease-in;
    transform:scale(0) !important;
    opacity:0;
  }
  .no-anim .tile{ transition:none !important; }

  /* ---------- Erikoispalat ---------- */
  .tile.sp::before{
    content:"";
    position:absolute;
    inset:14%;
    border-radius:50%;
    box-shadow:0 0 10px 4px rgba(229,185,84,.4);
    animation:spPulse 1.5s ease-in-out infinite;
  }
  @keyframes spPulse{
    50%{ box-shadow:0 0 16px 7px rgba(229,185,84,.65); }
  }
  .tile.wild::before{
    box-shadow:0 0 14px 6px rgba(255,232,160,.6);
    animation:wildPulse 2.4s linear infinite;
  }
  @keyframes wildPulse{
    0%,100%{ filter:hue-rotate(0deg); box-shadow:0 0 14px 6px rgba(255,232,160,.6); }
    50%{ filter:hue-rotate(45deg); box-shadow:0 0 20px 9px rgba(255,232,160,.8); }
  }
  .tile svg.badge{
    position:absolute;
    width:42%; height:42%;
    right:1%; bottom:1%;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
  }
  .tile.born svg:first-child{ animation:bornPop .4s ease; }
  @keyframes bornPop{
    0%{ transform:scale(.2) rotate(-20deg); }
    65%{ transform:scale(1.25) rotate(6deg); }
    100%{ transform:scale(1) rotate(0); }
  }

  /* ---------- Vihje ---------- */
  .tile.hint{ z-index:3; }
  .tile.hint svg:first-child{
    animation:hintWiggle 1.6s ease;
    filter:drop-shadow(0 0 7px rgba(242,237,222,.75)) drop-shadow(0 2px 2px rgba(0,0,0,.35));
  }
  @keyframes hintWiggle{
    0%,100%{ transform:scale(1); }
    15%,45%,75%{ transform:scale(1.18); }
    30%,60%{ transform:scale(.94); }
  }

  /* ---------- Tehosteet ---------- */
  .fx{ position:absolute; pointer-events:none; z-index:5; }
  .fx.beam-h{
    left:0; width:100%;
    background:linear-gradient(90deg, transparent, rgba(229,185,84,.9) 30%, rgba(229,185,84,.9) 70%, transparent);
    border-radius:8px;
    animation:fxFade .55s ease-out forwards;
  }
  .fx.beam-v{
    top:0; height:100%;
    background:linear-gradient(180deg, transparent, rgba(229,185,84,.9) 30%, rgba(229,185,84,.9) 70%, transparent);
    border-radius:8px;
    animation:fxFade .55s ease-out forwards;
  }
  .fx.boom{
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,225,150,.95), rgba(200,68,60,.4) 55%, transparent 72%);
    animation:fxBoom .55s ease-out forwards;
  }
  .fx.flash{
    inset:0;
    background:radial-gradient(circle, rgba(255,235,170,.55), transparent 70%);
    animation:fxFade .65s ease-out forwards;
  }
  @keyframes fxFade{ from{ opacity:1; } to{ opacity:0; } }
  @keyframes fxBoom{
    0%{ transform:scale(.25); opacity:1; }
    100%{ transform:scale(1.15); opacity:0; }
  }

  .sel-ring{
    position:absolute;
    border:3px solid var(--gold);
    border-radius:12px;
    pointer-events:none;
    z-index:4;
    box-shadow:0 0 12px rgba(229,185,84,.5);
    display:none;
  }
  .cursor-ring{
    position:absolute;
    border:2px dashed rgba(242,237,222,.75);
    border-radius:12px;
    pointer-events:none;
    z-index:4;
    display:none;
  }
  .board.kb .cursor-ring{ display:block; }

  /* ---------- Chain banner ---------- */
  .banner{
    position:absolute;
    left:50%; top:42%;
    transform:translate(-50%,-50%) scale(.6);
    font-family:Georgia,serif;
    font-weight:700;
    font-size:clamp(1.4rem, 6vw, 2.2rem);
    color:var(--gold);
    text-shadow:0 2px 0 rgba(0,0,0,.5), 0 0 18px rgba(229,185,84,.45);
    opacity:0;
    pointer-events:none;
    z-index:6;
    white-space:nowrap;
  }
  .banner.show{ animation:bannerPop 1s ease forwards; }
  @keyframes bannerPop{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.6); }
    18%{ opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    70%{ opacity:1; transform:translate(-50%,-58%) scale(1); }
    100%{ opacity:0; transform:translate(-50%,-70%) scale(1); }
  }

  /* ---------- Overlay ---------- */
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(13,22,16,.88);
    backdrop-filter:blur(3px);
    border-radius:16px;
  }
  /* päävalikko irtoaa laudasta koko ruudun kokoiseksi */
  .overlay.menu{
    position:fixed;
    border-radius:0;
    justify-content:flex-start;
    overflow-y:auto;
    padding:max(24px, env(safe-area-inset-top)) 16px
            max(24px, env(safe-area-inset-bottom));
  }
  .overlay.menu #ovTitle{ margin-top:4vh; }
  .overlay-dummy{ display:none; }
  .overlay{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    gap:10px;
    z-index:10;
    opacity:0;
    pointer-events:none;
    transition:opacity .35s ease;
    padding:20px;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay h2{
    font-family:Georgia,serif;
    font-size:1.9rem;
    color:var(--gold);
    letter-spacing:.04em;
  }
  .overlay .final{ font-size:1.05rem; line-height:1.7; color:var(--cream); }
  .overlay .final b{ font-variant-numeric:tabular-nums; }
  .overlay .record{ color:#8fd08a; font-weight:700; }
  .overlay .ovstars{
    font-size:2rem;
    letter-spacing:.18em;
    display:inline-block;
  }
  .overlay .ovstars span{ color:#54604d; }
  .overlay .ovstars span.on{ color:var(--gold); text-shadow:0 0 14px rgba(229,185,84,.55); }

  /* ---------- Buttons & footer ---------- */
  button.btn{
    font:inherit;
    font-weight:800;
    letter-spacing:.05em;
    background:var(--gold);
    color:#3a2c10;
    border:none;
    border-radius:999px;
    padding:11px 26px;
    cursor:pointer;
    box-shadow:0 4px 0 #a37f2c, 0 6px 14px var(--shadow);
    transition:transform .08s ease, box-shadow .08s ease;
  }
  button.btn:active{ transform:translateY(3px); box-shadow:0 1px 0 #a37f2c; }
  button.btn:focus-visible{ outline:3px solid var(--cream); outline-offset:3px; }

  .controls{
    margin-top:14px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:center;
    gap:10px;
  }
  .controls .btn.small{ padding:8px 20px; font-size:.9rem; }
  .controls .btn.iconbtn{
    padding:8px 0;
    width:44px;
    font-size:1.05rem;
    border-radius:50%;
    line-height:1;
    transition:opacity .15s ease;
  }
  .controls .btn.iconbtn[aria-pressed="false"]{ opacity:.5; }

  /* ---------- Poimijan opas: puinen viitta ja opastaulu ---------- */
  .guide-btn{
    margin-top:20px;
    position:relative;
    flex:none;
    width:132px;
    min-width:132px;
    height:96px;
    min-height:96px;
    border:none;
    background:transparent;
    cursor:pointer;
    padding:0;
    transform:rotate(-1.4deg);
    transition:transform .16s ease;
    filter:drop-shadow(0 7px 12px var(--shadow));
  }
  .guide-btn:hover{ transform:rotate(0deg) scale(1.04); }
  .guide-btn:focus-visible{ outline:3px solid var(--cream); outline-offset:5px; border-radius:5px; }
  /* kirjan selkämys vasemmassa reunassa */
  .guide-btn .book-spine{
    position:absolute;
    left:0; top:0; bottom:0;
    width:15px;
    border-radius:6px 3px 3px 6px;
    background:linear-gradient(90deg, #3a2413, #57351c 55%, #4a2c17);
    box-shadow:inset -2px 0 3px rgba(0,0,0,.5), inset 1px 0 0 rgba(255,220,170,.15);
  }
  /* sivunipun reunat selkämyksen takana */
  .guide-btn .book-spine::after{
    content:"";
    position:absolute;
    right:-4px; top:5px; bottom:5px;
    width:5px;
    border-radius:0 2px 2px 0;
    background:repeating-linear-gradient(180deg, #efe4c8 0 2px, #cdbf9c 2px 4px);
  }
  /* nahkakansi */
  .guide-btn .book-face{
    position:absolute;
    left:11px; right:0; top:0; bottom:0;
    border-radius:3px 8px 8px 3px;
    background:
      repeating-linear-gradient(48deg, rgba(0,0,0,.05) 0 3px, transparent 3px 8px),
      linear-gradient(150deg, #7c5233, #5f3d24 60%, #4f3320);
    border:1px solid #3a2413;
    box-shadow:inset 0 1px 0 rgba(255,225,180,.2), inset 0 -6px 14px rgba(0,0,0,.35);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    font-family:Georgia,serif;
    font-weight:700;
    font-size:.98rem;
    line-height:1.15;
    letter-spacing:.05em;
    color:#f1e2c4;
    text-shadow:0 -1px 0 rgba(0,0,0,.5), 0 1px 0 rgba(255,230,190,.12);
  }
  /* kohokultauskehys */
  .guide-btn .book-band{
    position:absolute;
    inset:7px 9px;
    border:1.5px solid rgba(216,178,110,.55);
    border-radius:2px 5px 5px 2px;
    pointer-events:none;
  }
  .guide-btn .book-leaf{
    color:#c9a45a;
    font-size:1.05rem;
    margin-top:3px;
  }

  .guide-overlay{
    position:fixed;
    inset:0;
    background:rgba(10,18,13,.78);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .25s ease;
  }
  .guide-overlay.show{ opacity:1; pointer-events:auto; }

  .guide{
    width:min(560px, 100%);
    max-height:88vh;
    overflow-y:auto;
    background:
      repeating-linear-gradient(88deg, rgba(0,0,0,.07) 0 2px, transparent 2px 11px),
      linear-gradient(180deg, #7d5838, #66452a 60%, #573a22);
    border:4px solid #462e15;
    border-radius:14px;
    box-shadow:0 18px 50px rgba(0,0,0,.6);
    padding:14px;
  }

  .guide-paper{
    background:linear-gradient(180deg, #f4efe0, #ece5d0);
    border-radius:8px;
    padding:20px 20px 22px;
    color:#33402f;
    position:relative;
    box-shadow:inset 0 0 16px rgba(90,70,40,.22), 0 2px 6px rgba(0,0,0,.35);
  }
  /* punaiset nastat paperin kulmissa */
  .guide-paper::before, .guide-paper::after{
    content:"";
    position:absolute;
    top:9px;
    width:14px; height:14px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #e88b83, #b13c33 55%, #6f1f19);
    box-shadow:0 2px 3px rgba(0,0,0,.45);
  }
  .guide-paper::before{ left:14px; }
  .guide-paper::after{ right:14px; }

  .guide h2{
    font-family:Georgia,serif;
    text-align:center;
    color:#5e3f26;
    letter-spacing:.14em;
    font-size:1.25rem;
    margin-bottom:2px;
  }
  .guide h2 .leaf{ color:#6f8f57; font-size:.7em; vertical-align:.3em; letter-spacing:0; }
  .guide h3{
    font-size:.76rem;
    text-transform:uppercase;
    letter-spacing:.15em;
    color:#6b4a2c;
    border-bottom:1px solid rgba(107,74,44,.35);
    padding-bottom:3px;
    margin:16px 0 8px;
  }
  .guide p, .guide li{ font-size:.88rem; line-height:1.55; }
  .guide ul{ list-style:none; margin:0; padding:0; }
  .guide li{ display:flex; align-items:flex-start; gap:9px; margin-bottom:8px; }
  .guide .gi{ flex:0 0 26px; width:26px; height:26px; margin-top:1px; }
  .guide .gi svg{ width:100%; height:100%; display:block; }
  .guide .sp-name{ color:#9c741f; font-weight:700; }
  .guide .plus{ color:#4a7a3c; font-weight:700; }
  .guide kbd{
    background:#e4dcc4;
    border:1px solid #b8ab8a;
    border-radius:4px;
    padding:0 5px;
    font-family:inherit;
    font-size:.92em;
    color:#4a3a20;
  }
  .guide-close{ display:block; margin:18px auto 0; }

  /* ---------- Vaellus: varustevalinta ja sirut ---------- */
  .draft-paper{
    width:min(430px, 100%);
    background:linear-gradient(180deg, #213627, #1a2c20);
    border:2px solid #3a5a44;
    border-radius:16px;
    padding:18px 16px 20px;
    box-shadow:0 18px 50px rgba(0,0,0,.6);
    text-align:center;
  }
  .draft-paper h2{
    font-family:Georgia,serif;
    color:var(--gold);
    letter-spacing:.1em;
    margin-bottom:14px;
    font-size:1.3rem;
  }
  .cards{ display:flex; flex-direction:column; gap:10px; }
  .card{
    font:inherit;
    text-align:left;
    display:grid;
    grid-template-columns:44px 1fr;
    grid-template-rows:auto auto;
    column-gap:12px;
    background:var(--bg-moss);
    border:2px solid #35543e;
    border-radius:12px;
    color:var(--cream);
    padding:12px 14px;
    cursor:pointer;
    transition:transform .12s ease, border-color .12s ease;
  }
  .card:hover{ transform:translateY(-2px); border-color:var(--gold); }
  .card:focus-visible{ outline:3px solid var(--cream); outline-offset:2px; }
  .card .cicon{ grid-row:1/3; font-size:1.7rem; align-self:center; text-align:center; }
  .card .cname{ font-weight:800; color:var(--gold); }
  .card .cdesc{ font-size:.85rem; color:var(--cream-dim); line-height:1.4; }
  .card.curse{ border-color:#7a3a34; }

/* =========================================================
   Äänet – Web Audio -synteesi, ei äänitiedostoja
   ========================================================= */

const Sfx = (() => {
  let ctx = null, master = null, noiseBuf = null, on = true;

  /* Luo/herätä äänikonteksti – kutsuttava käyttäjän eleestä (selainrajoitus). */
  function unlock(){
    if (!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ctx = new AC();
      master = ctx.createGain();
      master.gain.value = 0.35;
      master.connect(ctx.destination);
      noiseBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.5), ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }
    if (ctx.state === "suspended") ctx.resume();
    startMusic();
  }

  const ready = () => on && ctx && ctx.state === "running";

  /* Oskillaattoripiippaus: taajuusliuku f0→f1, nopea attack, eksp. häivytys. */
  function tone({ f0, f1 = 0, type = "sine", t = 0, a = 0.005, d = 0.15, peak = 0.3 }){
    if (!ready()) return;
    const t0 = ctx.currentTime + t;
    const o = ctx.createOscillator();
    o.type = type;
    o.frequency.setValueAtTime(f0, t0);
    if (f1) o.frequency.exponentialRampToValueAtTime(f1, t0 + a + d);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d);
    o.connect(g).connect(master);
    o.start(t0);
    o.stop(t0 + a + d + 0.05);
  }

  /* Suodatettu kohinapurske (viuhahdukset, rasahdukset). */
  function noise({ t = 0, a = 0.005, d = 0.2, peak = 0.25, fType = "lowpass", f0 = 1000, f1 = 0 }){
    if (!ready()) return;
    const t0 = ctx.currentTime + t;
    const src = ctx.createBufferSource();
    src.buffer = noiseBuf;
    const f = ctx.createBiquadFilter();
    f.type = fType;
    f.frequency.setValueAtTime(f0, t0);
    if (f1) f.frequency.exponentialRampToValueAtTime(f1, t0 + a + d);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + a);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + a + d);
    src.connect(f).connect(g).connect(master);
    src.start(t0);
    src.stop(t0 + a + d + 0.05);
  }

  /* Pentatoninen asteikko: ketjun poksahdukset nousevat aina harmonisesti. */
  const PENTA = [0, 2, 4, 7, 9, 12, 14, 16];

  /* ---------- Taustamusiikki: generatiivinen metsäambient ----------
     Sama C-duuripentatoninen kuin tehosteissa, joten kaikki soi yhteen. */

  let musicOn = true, musicStarted = false, musicBus = null;
  let tension = false;

  /* Aktien sävelmaailmat C-urkupisteen päällä:
     Metsä C-duuripentatoninen · Suo A-mollipentatoninen, verkkaisempi
     Pohjola avara G-duuripentatoninen, harva ja korkea */
  const MOODS = [
    { root: 261.63, iv: [0, 2, 4, 7, 9],  slow: 1,    fifth: 0.22 },
    { root: 220.00, iv: [0, 3, 5, 7, 10], slow: 1.25, fifth: 0.12 },
    { root: 392.00, iv: [0, 2, 4, 7, 9],  slow: 1.45, fifth: 0.18 }
  ];
  let mood = MOODS[0];

  function startMusic(){
    if (musicStarted || !ctx) return;
    musicStarted = true;

    musicBus = ctx.createGain();
    musicBus.gain.value = musicOn ? 1 : 0;
    musicBus.connect(ctx.destination);

    // urkupistepohja: C3 + G3 + kevyesti viritetty kaksois-C, hidas hengitys
    const pad = ctx.createGain();
    pad.gain.value = 0.65; // LFO moduloi ±0.35
    const padFilter = ctx.createBiquadFilter();
    padFilter.type = "lowpass";
    padFilter.frequency.value = 700;
    pad.connect(padFilter).connect(musicBus);
    [[130.81, 0.03], [196.0, 0.02], [131.5, 0.013]].forEach(([f, g]) => {
      const o = ctx.createOscillator();
      o.type = "sine";
      o.frequency.value = f;
      const og = ctx.createGain();
      og.gain.value = g;
      o.connect(og).connect(pad);
      o.start();
    });
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.06;
    const lfoDepth = ctx.createGain();
    lfoDepth.gain.value = 0.35;
    lfo.connect(lfoDepth).connect(pad.gain);
    lfo.start();

    // hiljainen tuuli: silmukoitua kohinaa hitaasti liikkuvan kaistanpäästön läpi
    const wind = ctx.createBufferSource();
    wind.buffer = noiseBuf;
    wind.loop = true;
    const windFilter = ctx.createBiquadFilter();
    windFilter.type = "bandpass";
    windFilter.frequency.value = 420;
    windFilter.Q.value = 0.7;
    const windLfo = ctx.createOscillator();
    windLfo.frequency.value = 0.05;
    const windLfoDepth = ctx.createGain();
    windLfoDepth.gain.value = 160;
    windLfo.connect(windLfoDepth).connect(windFilter.frequency);
    const windGain = ctx.createGain();
    windGain.gain.value = 0.016;
    wind.connect(windFilter).connect(windGain).connect(musicBus);
    wind.start();
    windLfo.start();

    scheduleNote();
  }

  /* pehmeä harppusävel musiikkiväylään */
  function mtone(f, t){
    const t0 = ctx.currentTime + t;
    const o = ctx.createOscillator();
    o.type = "sine";
    o.frequency.value = f;
    const g = ctx.createGain();
    const peak = 0.03 + Math.random() * 0.025;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.6);
    o.connect(g).connect(musicBus);
    o.start(t0);
    o.stop(t0 + 1.7);
  }

  /* satunnaiset sävelet; Kirin loppukiri tihentää ja nostaa niitä */
  function scheduleNote(){
    const range = tension ? [900, 1900] : [1900 * mood.slow, 4200 * mood.slow];
    const delay = range[0] + Math.random() * (range[1] - range[0]);
    setTimeout(() => {
      if (musicOn && ctx && ctx.state === "running" && !document.hidden){
        const octs = tension ? [1, 2] : [0, 1, 2];
        const f = mood.root *
          Math.pow(2, mood.iv[Math.floor(Math.random() * mood.iv.length)] / 12) *
          Math.pow(2, octs[Math.floor(Math.random() * octs.length)]);
        mtone(f, 0);
        if (Math.random() < mood.fifth) mtone(f * 1.5, 0.18); // kvintti perään
      }
      scheduleNote();
    }, delay);
  }

  return {
    unlock,
    toggle(){ on = !on; return on; },
    musicToggle(){
      musicOn = !musicOn;
      if (musicBus){
        const t0 = ctx.currentTime;
        musicBus.gain.cancelScheduledValues(t0);
        musicBus.gain.setValueAtTime(musicBus.gain.value, t0);
        musicBus.gain.linearRampToValueAtTime(musicOn ? 1 : 0, t0 + 0.6);
      }
      return musicOn;
    },
    setTension(t){ tension = t; },
    setMood(act){ mood = MOODS[Math.min(2, Math.max(0, act - 1))]; },
    swap(){ tone({ f0: 700, f1: 480, type: "triangle", d: .07, peak: .22 }); },
    invalid(){
      tone({ f0: 170, type: "square", d: .07, peak: .12 });
      tone({ f0: 145, type: "square", t: .09, d: .09, peak: .12 });
    },
    select(){ tone({ f0: 950, d: .035, peak: .07 }); },
    pop(chain, n){
      const f = 523 * Math.pow(2, PENTA[Math.min(chain - 1, PENTA.length - 1)] / 12);
      tone({ f0: f * 1.3, f1: f * 0.7, d: .13, peak: .28 + Math.min(.15, n * .008) });
      noise({ d: .05, peak: .1, f0: 3000, fType: "highpass" });
    },
    born(){
      tone({ f0: 880, d: .12, peak: .18 });
      tone({ f0: 1175, t: .08, d: .16, peak: .18 });
    },
    bornWild(){
      [659, 880, 1109, 1319].forEach((f, i) => tone({ f0: f, t: i * .07, d: .2, peak: .18 }));
    },
    beam(){ noise({ d: .25, peak: .22, f0: 500, f1: 4500, fType: "bandpass" }); },
    boom(){
      tone({ f0: 150, f1: 45, d: .35, peak: .45 });
      noise({ d: .25, peak: .28, f0: 400 });
    },
    bigBoom(){
      tone({ f0: 110, f1: 32, d: .5, peak: .5 });
      tone({ f0: 220, f1: 60, t: .06, d: .4, peak: .25 });
      noise({ d: .4, peak: .32, f0: 300 });
    },
    flashWild(){
      tone({ f0: 400, f1: 1600, d: .35, peak: .22 });
      tone({ f0: 800, f1: 3200, t: .05, d: .3, peak: .1 });
    },
    timePlus(){
      tone({ f0: 1200, type: "square", d: .05, peak: .07 });
      tone({ f0: 1600, type: "square", t: .06, d: .07, peak: .07 });
    },
    tick(){ tone({ f0: 1000, d: .03, peak: .09 }); },
    crack(){
      noise({ d: .09, peak: .28, f0: 2500, fType: "highpass" });
      tone({ f0: 1400, f1: 900, d: .06, peak: .12 });
    },
    freeze(){
      tone({ f0: 2200, f1: 700, d: .3, peak: .18 });
      noise({ d: .25, peak: .14, f0: 4500, fType: "highpass" });
    },
    hurt(){
      tone({ f0: 220, f1: 120, type: "square", d: .12, peak: .18 });
    },
    dropHome(){
      tone({ f0: 340, f1: 300, type: "triangle", d: .1, peak: .3 });
      tone({ f0: 523, t: .09, d: .16, peak: .2 });
      tone({ f0: 784, t: .18, d: .22, peak: .2 });
    },
    mossGrow(){ noise({ d: .22, peak: .16, f0: 240 }); },
    shuffle(){ noise({ d: .3, peak: .13, f0: 1800, fType: "bandpass" }); },
    gameOver(){
      [523, 392, 311].forEach((f, i) => tone({ f0: f, t: i * .18, d: .28, peak: .22, type: "triangle" }));
    },
    fanfare(){
      [523, 659, 784, 1047].forEach((f, i) => tone({ f0: f, t: i * .12, d: .3, peak: .22, type: "triangle" }));
    }
  };
})();

/* =========================================================
   --- LOGIC ---  (puhtaat funktiot, ei DOM-riippuvuuksia)
   ========================================================= */

/* erikoispalatyypit */
const S_NONE = 0, S_ROW = 1, S_COL = 2, S_BOMB = 3, S_WILD = 4;
/* tyyppi -1 = kultakäpy (ei marjatyyppiä, ei muodosta sarjoja) */
const T_WILD = -1;
/* tyyppi -2 = käpykori (pudotustavoite): ei muodosta sarjoja, ei tuhoudu,
   putoaa painovoiman mukana ja kerätään, kun se saavuttaa pohjarivin */
const T_DROP = -2;

function randType(){ return Math.floor(Math.random() * NTYPES); }

const keyOf = (r, c) => r + "," + c;
const unkey = k => k.split(",").map(Number);

/* Kaikki 3+ sarjat suuntineen: [{dir:'h'|'v', len, cells:["r,c",...]}] */
function findRuns(types){
  const runs = [];
  const isBerry = t => t !== null && t >= 0;
  for (let r = 0; r < ROWS; r++){
    let run = 1;
    for (let c = 1; c <= COLS; c++){
      if (c < COLS && isBerry(types[r][c]) && types[r][c] === types[r][c-1]) run++;
      else {
        if (run >= 3 && isBerry(types[r][c-1])){
          const cells = [];
          for (let k = c - run; k < c; k++) cells.push(keyOf(r, k));
          runs.push({ dir:"h", len:run, cells });
        }
        run = 1;
      }
    }
  }
  for (let c = 0; c < COLS; c++){
    let run = 1;
    for (let r = 1; r <= ROWS; r++){
      if (r < ROWS && isBerry(types[r][c]) && types[r][c] === types[r-1][c]) run++;
      else {
        if (run >= 3 && isBerry(types[r-1][c])){
          const cells = [];
          for (let k = r - run; k < r; k++) cells.push(keyOf(k, c));
          runs.push({ dir:"v", len:run, cells });
        }
        run = 1;
      }
    }
  }
  return runs;
}

/* Joukko kaikista sarjasoluista (vanha rajapinta säilyy). */
function findMatches(types){
  const out = new Set();
  for (const run of findRuns(types))
    for (const k of run.cells) out.add(k);
  return out;
}

function swapTypes(types, r1, c1, r2, c2){
  const t = types[r1][c1];
  types[r1][c1] = types[r2][c2];
  types[r2][c2] = t;
}

function swapMakesMatch(types, r1, c1, r2, c2){
  swapTypes(types, r1, c1, r2, c2);
  const ok = findMatches(types).size > 0;
  swapTypes(types, r1, c1, r2, c2);
  return ok;
}

/* Sallittu siirto: tavallinen sarjavaihto, kultakäpy minkä tahansa viereen
   TAI kaksi vierekkäistä yhdistettävää erikoispalaa. Jäätyneitä paloja
   ei voi siirtää, joten ne eivät kelpaa siirron osapuoliksi. */
function hasValidMove(types, specials, ices){
  const combo = s => s === S_ROW || s === S_COL || s === S_BOMB;
  const iced = (r, c) => !!(ices && ices[r][c]);
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      if (iced(r, c)) continue;
      if (specials && combo(specials[r][c])){
        if ((c+1 < COLS && combo(specials[r][c+1]) && !iced(r, c+1)) ||
            (r+1 < ROWS && combo(specials[r+1][c]) && !iced(r+1, c))) return true;
      }
      if (types[r][c] === T_WILD){
        if ((c+1 < COLS && types[r][c+1] !== null && !iced(r, c+1)) ||
            (c-1 >= 0 && types[r][c-1] !== null && !iced(r, c-1)) ||
            (r+1 < ROWS && types[r+1][c] !== null && !iced(r+1, c)) ||
            (r-1 >= 0 && types[r-1][c] !== null && !iced(r-1, c))) return true;
        continue;
      }
      if (c + 1 < COLS && !iced(r, c+1) && swapMakesMatch(types, r, c, r, c + 1)) return true;
      if (r + 1 < ROWS && !iced(r+1, c) && swapMakesMatch(types, r, c, r + 1, c)) return true;
    }
  }
  return false;
}

/* Uusi lauta ilman valmiita sarjoja ja vähintään yhdellä siirrolla. */
function generateTypes(){
  for (let attempt = 0; attempt < 200; attempt++){
    const types = [];
    for (let r = 0; r < ROWS; r++){
      types.push([]);
      for (let c = 0; c < COLS; c++){
        let t;
        do { t = randType(); }
        while (
          (c >= 2 && types[r][c-1] === t && types[r][c-2] === t) ||
          (r >= 2 && types[r-1][c] === t && types[r-2][c] === t)
        );
        types[r].push(t);
      }
    }
    if (hasValidMove(types)) return types;
  }
  return null;
}

/* Suunnittelee poistot ja syntyvät erikoispalat sarjoista.
   swapKeys: vaihdetut solut (etusijalla erikoispalan paikaksi) tai null. */
function planClears(runs, swapKeys){
  const clearSet = new Set();
  for (const run of runs) for (const k of run.cells) clearSet.add(k);

  const creations = [];
  const used = new Set();
  const pickPos = run => {
    if (swapKeys)
      for (const k of run.cells)
        if (swapKeys.has(k) && !used.has(k)) return k;
    const mid = run.cells[Math.floor(run.cells.length / 2)];
    if (!used.has(mid)) return mid;
    return run.cells.find(k => !used.has(k)) || null;
  };

  // 1) viiden sarja → kultakäpy
  for (const run of runs){
    if (run.len >= 5){
      const k = pickPos(run);
      if (k){ creations.push({ k, s: S_WILD }); used.add(k); run.consumed = true; }
    }
  }
  // 2) L/T-risteys → karhunkäpälä
  for (const h of runs){
    if (h.dir !== "h" || h.consumed) continue;
    for (const v of runs){
      if (v.dir !== "v" || v.consumed) continue;
      const shared = h.cells.find(k => v.cells.includes(k));
      if (shared && !used.has(shared)){
        creations.push({ k: shared, s: S_BOMB });
        used.add(shared);
        h.consumed = v.consumed = true;
        break;
      }
    }
  }
  // 3) neljän sarja → harava (kaataa sarjaa vastaan kohtisuoran linjan)
  for (const run of runs){
    if (run.len === 4 && !run.consumed){
      const k = pickPos(run);
      if (k){ creations.push({ k, s: run.dir === "h" ? S_COL : S_ROW }); used.add(k); }
    }
  }
  return { clearSet, creations };
}

/* Laajentaa poistojoukkoa laukeavilla erikoispaloilla (ketjureaktiot).
   Palauttaa lauenneet erikoispalat tehosteita varten. */
function expandSpecials(clearSet, types, specials){
  const processed = new Set();
  const triggers = [];
  let again = true;
  while (again){
    again = false;
    for (const key of Array.from(clearSet)){
      if (processed.has(key)) continue;
      processed.add(key);
      const [r, c] = unkey(key);
      const s = specials[r][c];
      if (!s) continue;
      triggers.push({ r, c, s });
      const extra = [];
      if (s === S_ROW){
        for (let cc = 0; cc < COLS; cc++) extra.push(keyOf(r, cc));
      } else if (s === S_COL){
        for (let rr = 0; rr < ROWS; rr++) extra.push(keyOf(rr, c));
      } else if (s === S_BOMB){
        for (let rr = r-1; rr <= r+1; rr++)
          for (let cc = c-1; cc <= c+1; cc++)
            if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) extra.push(keyOf(rr, cc));
      } else if (s === S_WILD){
        // räjähdyksessä lauennut kultakäpy poimii satunnaisen lajin
        const present = new Set();
        for (let rr = 0; rr < ROWS; rr++)
          for (let cc = 0; cc < COLS; cc++)
            if (types[rr][cc] !== null && types[rr][cc] >= 0) present.add(types[rr][cc]);
        if (present.size){
          const arr = Array.from(present);
          const pick = arr[Math.floor(Math.random() * arr.length)];
          for (let rr = 0; rr < ROWS; rr++)
            for (let cc = 0; cc < COLS; cc++)
              if (types[rr][cc] === pick) extra.push(keyOf(rr, cc));
        }
      }
      for (const k of extra){
        const [rr, cc] = unkey(k);
        if (types[rr][cc] !== null && !clearSet.has(k)){
          clearSet.add(k);
          again = true;
        }
      }
    }
  }
  return triggers;
}

/* Kahden erikoispalan (harava/käpälä) yhdistelmän poistoalue.
   Keskus (r,c) = kohderuutu, johon pelaaja vaihtoi. */
function comboCells(s1, s2, r, c){
  const cells = new Set();
  const isLine = s => s === S_ROW || s === S_COL;
  let kind, dir = null;
  if (s1 === S_BOMB && s2 === S_BOMB){
    kind = "iso"; // karhuemo: 5×5
    for (let rr = r-2; rr <= r+2; rr++)
      for (let cc = c-2; cc <= c+2; cc++)
        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) cells.add(keyOf(rr, cc));
  } else if (isLine(s1) && isLine(s2)){
    kind = "risti"; // koko rivi + koko sarake
    for (let cc = 0; cc < COLS; cc++) cells.add(keyOf(r, cc));
    for (let rr = 0; rr < ROWS; rr++) cells.add(keyOf(rr, c));
  } else {
    kind = "kolmois"; // käpälä + harava: kolme linjaa haravan suuntaan
    dir = isLine(s1) ? s1 : s2;
    if (dir === S_ROW){
      for (let rr = r-1; rr <= r+1; rr++)
        if (rr >= 0 && rr < ROWS)
          for (let cc = 0; cc < COLS; cc++) cells.add(keyOf(rr, cc));
    } else {
      for (let cc = c-1; cc <= c+1; cc++)
        if (cc >= 0 && cc < COLS)
          for (let rr = 0; rr < ROWS; rr++) cells.add(keyOf(rr, cc));
    }
  }
  return { cells, kind, dir };
}

/* Etsii yhden mahdollisen siirron vihjettä varten.
   Suosii tavallista sarjavaihtoa (vaikein huomata); sitten
   yhdistelmäpari, sitten kultakäpy. Jäätyneet palat ohitetaan.
   Palauttaa [{r,c},{r,c}] tai null. */
function findMove(types, specials, ices){
  let combo = null, wild = null;
  const comboS = s => s === S_ROW || s === S_COL || s === S_BOMB;
  const iced = (r, c) => !!(ices && ices[r][c]);
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      if (iced(r, c)) continue;
      if (types[r][c] !== null && types[r][c] >= 0){
        if (c+1 < COLS && !iced(r, c+1) && types[r][c+1] !== null && types[r][c+1] >= 0 &&
            swapMakesMatch(types, r, c, r, c+1)) return [{r, c}, {r, c: c+1}];
        if (r+1 < ROWS && !iced(r+1, c) && types[r+1][c] !== null && types[r+1][c] >= 0 &&
            swapMakesMatch(types, r, c, r+1, c)) return [{r, c}, {r: r+1, c}];
      }
      if (!combo && specials && comboS(specials[r][c])){
        if (c+1 < COLS && comboS(specials[r][c+1]) && !iced(r, c+1))      combo = [{r, c}, {r, c: c+1}];
        else if (r+1 < ROWS && comboS(specials[r+1][c]) && !iced(r+1, c)) combo = [{r, c}, {r: r+1, c}];
      }
      if (!wild && types[r][c] === T_WILD){
        if (c+1 < COLS && types[r][c+1] !== null && !iced(r, c+1))      wild = [{r, c}, {r, c: c+1}];
        else if (c-1 >= 0 && types[r][c-1] !== null && !iced(r, c-1))   wild = [{r, c}, {r, c: c-1}];
        else if (r+1 < ROWS && types[r+1][c] !== null && !iced(r+1, c)) wild = [{r, c}, {r: r+1, c}];
        else if (r-1 >= 0 && types[r-1][c] !== null && !iced(r-1, c))   wild = [{r, c}, {r: r-1, c}];
      }
    }
  }
  return combo || wild;
}


/* Polunhaaraminipelien palkkioportaat: portit -> palkkiot.
   Sama porrastus kaikille minipeleille, jotta riski on helppo hahmottaa. */
function branchRewardTiers(gates){
  return {
    pot: gates * 20 + (gates >= 5 ? 400 : 0),
    perk: gates >= 10,
    amulet: gates >= 15
  };
}

/* Pomotaistelun mitoitus: siirtobudjetti ja elämät syvyyden/aktin mukaan.
   Vakiot kalibroitu bottisimulaatiolla (ks. taistelutestit). */
function battleTuning(depth, mini){
  const act = Math.ceil(depth / 10);
  const moves = mini ? 18 : 22;
  const dmgPerMove = 11;                       // botin mitattu keskivahinko/siirto
  const hpFactor = mini ? 0.82 : 1.0;
  const hp = Math.round(moves * dmgPerMove * hpFactor * (1 + 0.28 * (act - 1)));
  return { moves, hp };
}

/* --- Vaellus-tila: proseduraalinen tasogeneraattori ---
   Palauttaa tasospekin { moves, collect?, layout?, drops?, spread?, boss, name }.
   Vaikeus skaalautuu syvyyden mukaan; joka 4. etappi on Hiisi (pomo). */
function genRunLevel(depth, bossFlag){
  const boss = bossFlag !== undefined ? bossFlag : depth % 4 === 0;
  const act = Math.min(3, Math.ceil(depth / 10));
  const dd = Math.min(depth, 14);
  const rnd = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  const grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => "."));
  const spec = { moves: 0, boss, name: "" };
  let movesNeed = 0;

  function mossPattern(layers){
    const mShare = Math.min(0.5, 0.08 * dd);
    const cellTarget = Math.max(4, Math.round(layers / (1 + mShare)));
    const kind = pick(["patch", "band", "ring", "blobs"]);
    const cells = [];
    const addRect = (r0, c0, h, w) => {
      for (let r = r0; r < r0 + h; r++)
        for (let c = c0; c < c0 + w; c++)
          if (r >= 1 && r < ROWS - 1 && c >= 0 && c < COLS) cells.push(r + "," + c);
    };
    if (kind === "patch"){
      const h = rnd(2, 4), w = Math.max(2, Math.min(6, Math.ceil(cellTarget / h)));
      addRect(rnd(1, ROWS - 1 - h), rnd(1, COLS - 1 - w), h, w);
    } else if (kind === "band"){
      const h = cellTarget > 12 ? 2 : 1;
      addRect(rnd(1, ROWS - 1 - h), 1, h, 6);
    } else if (kind === "ring"){
      const s = rnd(4, 6);
      const r0 = rnd(1, Math.max(1, ROWS - 1 - s)), c0 = rnd(1, COLS - 1 - s);
      addRect(r0, c0, 1, s); addRect(r0 + s - 1, c0, 1, s);
      addRect(r0 + 1, c0, s - 2, 1); addRect(r0 + 1, c0 + s - 1, s - 2, 1);
    } else {
      const h = rnd(2, 3), w = rnd(2, 3);
      addRect(rnd(1, 3), rnd(1, 2), h, w);
      addRect(rnd(4, ROWS - 1 - h), rnd(4, COLS - 1 - w), h, w);
    }
    const uniq = [...new Set(cells)].slice(0, cellTarget);
    for (let i = uniq.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [uniq[i], uniq[j]] = [uniq[j], uniq[i]];
    }
    const extra = Math.max(0, Math.min(uniq.length, layers - uniq.length));
    uniq.forEach((k, i) => {
      const [r, c] = k.split(",").map(Number);
      grid[r][c] = i < extra ? "M" : "m";
    });
    return uniq.length + extra;
  }

  function addCollect(scale){
    const nTypes = dd >= 3 && Math.random() < 0.5 ? 2 : 1;
    const total = Math.round((12 + 3 * dd) * scale);
    spec.collect = spec.collect || {};
    const used = new Set(Object.keys(spec.collect));
    for (let i = 0; i < nTypes; i++){
      let t, g = 0;
      do { t = rnd(0, NTYPES - 1); } while (used.has(String(t)) && g++ < 20);
      used.add(String(t));
      spec.collect[t] = Math.max(6, Math.round(total / nTypes));
    }
    movesNeed += 12 + 0.5 * total;
  }
  function addMoss(scale){
    const layers = Math.min(32, Math.round((9 + 2.2 * dd) * scale));
    const real = mossPattern(layers);
    movesNeed += 9 + 0.75 * real;
  }
  function addIce(){
    const n = rnd(2, Math.min(8, 2 + dd));
    let placed = 0, g = 0;
    while (placed < n && g++ < 100){
      const r = rnd(0, ROWS - 1), c = rnd(0, COLS - 1);
      if (grid[r][c] === "."){ grid[r][c] = "j"; placed++; }
    }
    movesNeed += placed * 0.7;
  }
  function addDrops(n){
    spec.drops = (spec.drops || 0) + n;
    movesNeed += 10 * n;
  }

  if (boss){
    spec.name = "Hiisi";
    addCollect(1.25);
    addMoss(1.1);
    if (dd >= 6){ if (Math.random() < 0.5) addDrops(1); else spec.spread = true; }
    if (act >= 2) addIce();
    movesNeed = movesNeed * 0.80; // pomo: yhdistetyt tavoitteet jakavat poimintoja, mutta ei armoa
  } else {
    const pool = ["collect"];
    if (dd >= 2) pool.push("moss");
    if (dd >= 4) pool.push("mixed");
    if (dd >= 5) pool.push("drops");
    const cls = pick(pool);
    if (cls === "collect"){
      spec.name = "Marjareissu";
      addCollect(1);
      if (act >= 2 && Math.random() < 0.4) addIce();
    } else if (cls === "moss"){
      spec.name = "Sammalikko";
      addMoss(1);
      if (act >= 2 && Math.random() < 0.3) addIce();
      if (dd >= 6 && Math.random() < 0.3) spec.spread = true;
    } else if (cls === "mixed"){
      spec.name = "Kangasmaasto";
      addCollect(0.65);
      addMoss(0.65);
      movesNeed *= 0.8;
      if (act >= 2 && Math.random() < 0.3) addIce();
    } else {
      spec.name = "Korinkanto";
      addDrops(dd >= 9 ? 2 : 1);
      if (Math.random() < 0.5){ addCollect(0.5); movesNeed *= 0.85; }
    }
  }
  // Suo: usva peittää paloja; Pohjola: pyry jäädyttää kesken kentän
  if (act >= 2 && Math.random() < 0.55){
    let n = 3 + Math.floor(Math.random() * 4), g = 0;
    while (n > 0 && g++ < 100){
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (grid[r][c] === "."){ grid[r][c] = "u"; n--; movesNeed += 0.3; }
    }
  }
  if (act >= 3 && !boss && Math.random() < 0.45) spec.pyry = true;
  // aktikiristys vastaa pelaajan varustekasvua: myöhemmät alueet vaativat tehokkuutta
  const ACT_TIGHT = [1, 0.93, 0.86];
  spec.moves = Math.max(14, Math.min(40,
    Math.round(movesNeed * ACT_TIGHT[act - 1]) + 2 -
    Math.floor(dd / 4) - Math.max(0, dd - 9)));
  if (grid.some(row => row.some(ch => ch !== ".")))
    spec.layout = grid.map(row => row.join(""));
  return spec;
}

/* =========================================================
   Pysyvä tallennus: Aitta, ennätykset ja avaukset
   Turvallinen adapteri: localStorage jos saatavilla (esim.
   GitHub Pages / paikallinen tiedosto), muuten istuntomuisti.
   ========================================================= */

const Store = (() => {
  const KEY = "poimuri-vaellus";
  let mem = {};
  let persistent = false;
  try {
    if (typeof localStorage !== "undefined"){
      const raw = localStorage.getItem(KEY);
      if (raw) mem = JSON.parse(raw) || {};
      persistent = true;
    }
  } catch(e){ /* esikatselu tms: pysytään muistissa */ }
  function flush(){
    if (!persistent) return;
    try { localStorage.setItem(KEY, JSON.stringify(mem)); } catch(e){}
  }
  return {
    get: (k, d) => (k in mem ? mem[k] : d),
    set: (k, v) => { mem[k] = v; flush(); },
    persistent: () => persistent
  };
})();

let aitta = Store.get("aitta", 0);          // marjavaranto vaellusten välillä
let record = Store.get("record", null);      // { act, stage, score }
let unlocks = Store.get("unlocks", { tietaja: false, kaataja: false });
let owned = Store.get("owned", {});             // pysyvät ostot ja hahmonkehitys
let provisions = Store.get("provisions", {});   // eväät seuraavalle vaellukselle
let selectedChar = Store.get("char", "poimija");

const permOwned = id => !!owned[id];
const charIs = id => !!(RUN && RUN.char === id);
const heroUpgraded = () => !!(RUN && owned[RUN.char + "2"]);

function unlockChar(id){
  if (unlocks[id]) return false;
  unlocks[id] = true;
  Store.set("unlocks", unlocks);
  return true;
}

function bankBerries(n){
  if (n <= 0) return 0;
  // vain osa saaliista säilyy matkalta kotiin asti
  const banked = Math.round(n / 4 * (permOwned("avain") ? 1.2 : 1));
  aitta += banked;
  Store.set("aitta", aitta);
  return banked;
}

const sleep = ms => new Promise(res => setTimeout(res, ms));

const dur = ms => reduceMotion ? 30 : ms;

function measure(){
  tileSize = boardEl.clientWidth / COLS;
}

function place(el, r, c){
  el.style.width  = tileSize + "px";
  el.style.height = tileSize + "px";
  el.style.transform = `translate(${c * tileSize}px, ${r * tileSize}px)`;
}

function buildCellBackgrounds(){
  boardEl.querySelectorAll(".cellbg").forEach(e => e.remove());
  const pad = Math.max(2, tileSize * 0.045);
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      const d = document.createElement("div");
      d.className = "cellbg" + ((r + c) % 2 ? " alt" : "");
      d.style.left   = (c * tileSize + pad) + "px";
      d.style.top    = (r * tileSize + pad) + "px";
      d.style.width  = (tileSize - pad * 2) + "px";
      d.style.height = (tileSize - pad * 2) + "px";
      boardEl.insertBefore(d, boardEl.firstChild);
    }
  }
}

function decorateTile(el, t, s){
  el.innerHTML = (t === T_WILD ? WILD_ICON : t === T_DROP ? DROP_ICON : ICONS[t]) + (BADGES[s] || "");
  el.classList.toggle("sp",   s !== S_NONE);
  el.classList.toggle("wild", s === S_WILD);
}

function makeTile(t, s, r, c){
  const el = document.createElement("div");
  el.className = "tile";
  decorateTile(el, t, s);
  if (r >= 0 && ices[r] && ices[r][c]) el.insertAdjacentHTML("beforeend", '<div class="ice"></div>');
  if (r >= 0 && fog[r] && fog[r][c]) el.insertAdjacentHTML("beforeend", '<div class="fog"></div>');
  place(el, r, c);
  boardEl.appendChild(el);
  return el;
}

function rebuildBoardDOM(){
  boardEl.querySelectorAll(".tile").forEach(e => e.remove());
  tiles = [];
  for (let r = 0; r < ROWS; r++){
    tiles.push([]);
    for (let c = 0; c < COLS; c++){
      tiles[r].push(makeTile(types[r][c], specials[r][c], r, c));
    }
  }
}

function updateStats(){
  scoreEl.textContent = RUN ? RUN.score + score : score;
  bestEl.textContent = RUN ? RUN.act + "· " + RUN.stage + "/10" : "–";
  movesEl.textContent = moves;
  movesEl.classList.toggle("moves-low", moves <= 5 && !gameOver);

function showBanner(text){

}

function setSelected(sel){

  selRing.style.left   = (sel.c * tileSize + pad) + "px";

  selRing.style.height = (tileSize - pad * 2) + "px";
}

function updateCursorRing(){

  curRing.style.left   = (cursor.c * tileSize + pad) + "px";
  curRing.style.top    = (cursor.r * tileSize + pad) + "px";

const HINT_DELAY = 5000;
let hintTimer = null;

function resetIdle(){
  clearTimeout(hintTimer);
  boardEl.querySelectorAll(".tile.hint").forEach(e => e.classList.remove("hint"));
  if (gameOver) return;
  hintTimer = setTimeout(showHint, HINT_DELAY);
}

function showHint(){
  if (busy || gameOver){ resetIdle(); return; }
  const mv = findMove(types, specials, ices);
  if (!mv) return;
  for (const cell of mv){
    const el = tiles[cell.r][cell.c];
    if (el){
      el.classList.add("hint");
      setTimeout(() => el.classList.remove("hint"), 1700);
    }
  }
  // näytä uudelleen, jos pelaaja ei vieläkään toimi
  hintTimer = setTimeout(showHint, HINT_DELAY);
}

/* ---------- Tehosteet ---------- */

function spawnEffect(s, r, c){
  const d = document.createElement("div");
  if (s === S_ROW){
    d.className = "fx beam-h";
    d.style.top = (r * tileSize) + "px";
    d.style.height = tileSize + "px";
  } else if (s === S_COL){
    d.className = "fx beam-v";
    d.style.left = (c * tileSize) + "px";
    d.style.width = tileSize + "px";
  } else if (s === S_BOMB){
    d.className = "fx boom";
    const size = tileSize * 3;
    d.style.width = d.style.height = size + "px";
    d.style.left = ((c + 0.5) * tileSize - size / 2) + "px";
    d.style.top  = ((r + 0.5) * tileSize - size / 2) + "px";
  } else {
    d.className = "fx flash";
  }
  boardEl.appendChild(d);
  setTimeout(() => d.remove(), 700);
}

function spawnComboEffect(combo, r, c){
  if (combo.kind === "risti"){
    spawnEffect(S_ROW, r, c);
    spawnEffect(S_COL, r, c);
  } else if (combo.kind === "kolmois"){
    if (combo.dir === S_ROW){
      for (let rr = r-1; rr <= r+1; rr++)
        if (rr >= 0 && rr < ROWS) spawnEffect(S_ROW, rr, c);
    } else {
      for (let cc = c-1; cc <= c+1; cc++)
        if (cc >= 0 && cc < COLS) spawnEffect(S_COL, r, cc);
    }
  } else {
    // karhuemo: 5×5-räjähdys
    const d = document.createElement("div");
    d.className = "fx boom";
    const size = tileSize * 5;
    d.style.width = d.style.height = size + "px";
    d.style.left = ((c + 0.5) * tileSize - size / 2) + "px";
    d.style.top  = ((r + 0.5) * tileSize - size / 2) + "px";
    boardEl.appendChild(d);
    setTimeout(() => d.remove(), 700);
  }
}

   Vaihto ja kaskadit
   ========================================================= */

function swapModel(a, b){
  swapTypes(types, a.r, a.c, b.r, b.c);
  const s = specials[a.r][a.c];
  specials[a.r][a.c] = specials[b.r][b.c];
  specials[b.r][b.c] = s;
  const el = tiles[a.r][a.c];
  tiles[a.r][a.c] = tiles[b.r][b.c];
  tiles[b.r][b.c] = el;
}

async function trySwap(a, b){
  if (busy || gameOver) return;
  if (Math.abs(a.r - b.r) + Math.abs(a.c - b.c) !== 1) return;
  if (ices[a.r][a.c] || ices[b.r][b.c]){
    denyIce(ices[a.r][a.c] ? a : b);
    return;
  }
  busy = true;
  setSelected(null);
  mossHitThisTurn = false;

  const aWild = specials[a.r][a.c] === S_WILD;
  const bWild = specials[b.r][b.c] === S_WILD;

  const elA = tiles[a.r][a.c], elB = tiles[b.r][b.c];
  place(elA, b.r, b.c);
  place(elB, a.r, a.c);
  await sleep(dur(230));

  if (aWild || bWild){
    // kultakäpy: aina pätevä siirto
    Sfx.swap();
    swapModel(a, b);
    moves--;
    updateStats();

    const set = new Set();
    if (aWild && bWild){
      showBanner("Koko metsä!");
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (types[r][c] !== null) set.add(keyOf(r, c));
    } else {
      const wildPos  = aWild ? b : a;   // käpy on nyt vaihdon jälkeen täällä
      const berryPos = aWild ? a : b;
      const t = types[berryPos.r][berryPos.c];
      set.add(keyOf(wildPos.r, wildPos.c));
      if (t !== null && t >= 0){
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (types[r][c] === t) set.add(keyOf(r, c));
      } else {
        set.add(keyOf(berryPos.r, berryPos.c));
      }
    }
    spawnEffect(S_WILD, 0, 0);
    Sfx.flashWild();
    await resolveCascades(set, null);
    await afterTurn();
    busy = false;
    resetIdle();
    return;
  }

  const sA = specials[a.r][a.c], sB = specials[b.r][b.c];
  if (sA !== S_NONE && sB !== S_NONE){
    // erikoispalojen yhdistelmä: aina pätevä siirto
    Sfx.swap();
    swapModel(a, b);
    moves--;

    const combo = comboCells(sA, sB, b.r, b.c);
    // molemmat kuluvat yhdistelmään eivätkä laukea enää erikseen
    specials[a.r][a.c] = S_NONE;
    specials[b.r][b.c] = S_NONE;
    decorateTile(tiles[a.r][a.c], types[a.r][a.c], S_NONE);
    decorateTile(tiles[b.r][b.c], types[b.r][b.c], S_NONE);

    score += 100; // yhdistelmäbonus
    updateStats();

    if (combo.kind === "risti")        showBanner("Risti!");
    else if (combo.kind === "kolmois") showBanner("Kolmoiskaato!");
    else                               showBanner("Karhuemo!");
    spawnComboEffect(combo, b.r, b.c);
    if (combo.kind === "iso"){
      Sfx.bigBoom();
    } else {
      const n = combo.kind === "risti" ? 2 : 3;
      for (let i = 0; i < n; i++) setTimeout(() => Sfx.beam(), i * 80);
    }

    await resolveCascades(combo.cells, null);
    await afterTurn();
    busy = false;
    resetIdle();
    return;
  }

  if (swapMakesMatch(types, a.r, a.c, b.r, b.c)){
    Sfx.swap();
    swapModel(a, b);
    moves--;
    updateStats();
    await resolveCascades(null, new Set([keyOf(a.r, a.c), keyOf(b.r, b.c)]));
    await afterTurn();
  } else {
    Sfx.invalid();
    place(elA, a.r, a.c);
    place(elB, b.r, b.c);
    await sleep(dur(230));
  }
  busy = false;
  resetIdle();
}

async function resolveCascades(initialSet, swapKeys){
  let chain = 0;
  while (true){
    let clearSet, creations = [];
    if (initialSet){
      clearSet = initialSet;
      initialSet = null;
    } else {
      const runs = findRuns(types);
      if (!runs.length) break;
      const plan = planClears(runs, swapKeys);
      clearSet = plan.clearSet;
      creations = plan.creations;
      // Vaellus: Puukko muuntaa haravat karhunkäpäliksi
      if (perkCount("puukko"))
        for (const cr of creations)
          if (cr.s === S_ROW || cr.s === S_COL) cr.s = S_BOMB;
    }
    swapKeys = null;
    chain++;
    longestChain = Math.max(longestChain, chain);

    // erikoispalojen ketjureaktiot
    const triggers = expandSpecials(clearSet, types, specials);
    for (const tr of triggers) spawnEffect(tr.s, tr.r, tr.c);

    // syntyvät erikoispalat eivät tuhoudu vaan muuntuvat
    for (const cr of creations) clearSet.delete(cr.k);

    // Taival: jää imee osuman – kuori särkyy, pala säilyy
    let iceBroken = 0;
    let fogLifted = 0;
    for (const key of Array.from(clearSet)){
      const [r, c] = unkey(key);
      if (types[r][c] === T_DROP){ clearSet.delete(key); continue; } // kori ei tuhoudu
      if (fog[r][c]){
        fog[r][c] = false;
        fogLifted++;
        clearSet.delete(key); // osuma kuluu usvan hälventämiseen
        const el = tiles[r][c];
        if (el){
          const fe = el.querySelector(".fog");
          if (fe) fe.remove();
          el.classList.add("pop");
          setTimeout(() => el.classList.remove("pop"), 300);
        }
        continue;
      }
      if (ices[r][c]){
        if (!perkCount("virsut")) clearSet.delete(key); // virsuilla pala poimiutuu samalla
        ices[r][c] = false;
        iceBroken++;
        const el = tiles[r][c];
        if (el){
          const ie = el.querySelector(".ice");
          if (ie) ie.remove();
          el.classList.add("deny");
          setTimeout(() => el.classList.remove("deny"), 350);
        }
      }
    }
    if (iceBroken) Sfx.crack();

    // Vaellus: Hunajapurkki korottaa ketjukerrointa, Kultavaskooli synteä
    const chainMult = chain + (chain >= 2 ? perkCount("hunaja") : 0);
    score += clearSet.size * 10 * chainMult +
             creations.length * (50 + 100 * perkCount("vaskooli")) +
             iceBroken * 20 + fogLifted * 15;
    // Pomotaistelu: vahinko = poiminnat × ketju (sammal panssaroi solunsa)
    if (BATTLE){
      let armored = 0;
      for (const key of clearSet){
        const [r, c] = unkey(key);
        if (moss[r][c] > 0) armored++;
      }
      dealBossDamage((clearSet.size - armored) * chainMult +
                     creations.length * 25 + triggers.length * 15);
    }
    specialsMade += creations.length;


    updateStats();

    // banneri: erikoispala voittaa ketjukehut
    const born = creations.map(cr => cr.s);
    if (born.includes(S_WILD))      showBanner("Kultakäpy!");
    else if (born.includes(S_BOMB)) showBanner("Karhunkäpälä!");
    else if (born.length)           showBanner("Harava!");
    else if (chain >= 2)            showBanner(PRAISE[Math.min(chain, PRAISE.length - 1)]);

    // äänet: poksahdus nousee ketjun mukana, laukeamiset porrastettuna
    Sfx.pop(chain, clearSet.size);
    if (born.includes(S_WILD))     Sfx.bornWild();
    else if (creations.length)     Sfx.born();
    triggers.slice(0, 3).forEach((tr, i) => setTimeout(() => {
      if (tr.s === S_BOMB)      Sfx.boom();
      else if (tr.s === S_WILD) Sfx.flashWild();
      else                      Sfx.beam();
    }, i * 90));

    // poksautus
    for (const key of clearSet){
      const [r, c] = unkey(key);
      if (tiles[r][c]) tiles[r][c].classList.add("pop");
    }
    await sleep(dur(240));
    for (const key of clearSet){
      const [r, c] = unkey(key);
      // Taival: poimintatavoitteet ja sammalen ohennus
      const t = types[r][c];
      if (t !== null && t >= 0){
        if (collectGoals[t] > 0) collectGoals[t]--;
        if (RUN) RUN.berries++; // jokainen poimittu marja kertyy Aittaan
      }
      if (moss[r][c] > 0){
        const dec = Math.min(moss[r][c], 1 + perkCount("sukat"));
        moss[r][c] -= dec;
        mossLeft -= dec;
        mossHitThisTurn = true;
        updateMossEl(r, c);
      }
      if (tiles[r][c]){ tiles[r][c].remove(); tiles[r][c] = null; }
      types[r][c] = null;
      specials[r][c] = S_NONE;
    }
    if (objMode()) renderGoals();

    // muunna syntyvät erikoispalat paikoilleen
    for (const cr of creations){
      const [r, c] = unkey(cr.k);
      if (ices[r][c]){
        ices[r][c] = false;
        const ie = tiles[r][c] && tiles[r][c].querySelector(".ice");
        if (ie) ie.remove();
      }
      if (cr.s === S_WILD) types[r][c] = T_WILD;
      specials[r][c] = cr.s;
      const el = tiles[r][c];
      if (el){
        decorateTile(el, types[r][c], cr.s);
        el.classList.add("born");
        setTimeout(() => el.classList.remove("born"), 450);
      }
    }

    // painovoima + täyttö
    dropAndRefill();
    await sleep(dur(340));
    boardEl.querySelectorAll(".tile.falling").forEach(e => e.classList.remove("falling"));
    await collectDropsAtBottom();
  }
}

/* Painovoima ja uusien palojen kylvö laudan yläpuolelta. */
function dropAndRefill(){
  for (let c = 0; c < COLS; c++){
    let write = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--){
      if (types[r][c] !== null){
        if (write !== r){
          types[write][c]    = types[r][c];
          specials[write][c] = specials[r][c];
          ices[write][c]     = ices[r][c];
          fog[write][c]      = fog[r][c];
          tiles[write][c]    = tiles[r][c];
          types[r][c] = null;
          specials[r][c] = S_NONE;
          ices[r][c] = false;
          fog[r][c] = false;
          tiles[r][c] = null;
          tiles[write][c].classList.add("falling");
          place(tiles[write][c], write, c);
        }
        write--;
      }
    }
    let spawn = 1;
    for (let r = write; r >= 0; r--){
      const t = randType();
      types[r][c] = t;
      specials[r][c] = S_NONE;
      ices[r][c] = false;
      fog[r][c] = false;
      const el = makeTile(t, S_NONE, -spawn, c);
      el.classList.add("falling");
      tiles[r][c] = el;
      void el.offsetWidth;
      place(el, r, c);
      spawn++;
    }
  }
}

/* Kerää pohjariville pudonneet käpykorit ja täyttää jättämänsä aukot. */
async function collectDropsAtBottom(){
  while (dropLeft > 0){
    const thr = ROWS - 1 - Math.min(2, perkCount("taky")); // Täkykori laskee kynnystä
    const hits = [];
    for (let r = thr; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (types[r][c] === T_DROP) hits.push({ r, c });
    if (!hits.length) return;
    Sfx.dropHome();
    showBanner("Kori perillä!");
    for (const h of hits){
      dropLeft--;
      score += 150;
      if (tiles[h.r][h.c]) tiles[h.r][h.c].classList.add("pop");
    }
    updateStats();
    renderGoals();
    await sleep(dur(260));
    for (const h of hits){
      if (tiles[h.r][h.c]){ tiles[h.r][h.c].remove(); tiles[h.r][h.c] = null; }
      types[h.r][h.c] = null;
      specials[h.r][h.c] = S_NONE;
      ices[h.r][h.c] = false;
    }
    dropAndRefill();
    await sleep(dur(340));
    boardEl.querySelectorAll(".tile.falling").forEach(e => e.classList.remove("falling"));
  }
}

async function afterTurn(){
  if (goalsComplete()){ await runLevelWin(); return; }
  if (moves <= 0){ runLevelFail(); return; }
  if (BATTLE){
    BATTLE.counter--;
    if (BATTLE.counter <= 0) await performBossAttack();
    else renderBossBar();
    if (moves <= 0){ runLevelFail(); return; } // ahmaisu saattoi syödä viimeisen
  } else {
    const doSpread = activeSpec().spread || (curseOn("rame") && mossTotal > 0);
    if (doSpread && !mossHitThisTurn) spreadMoss();
    if (activeSpec().pyry && --pyryCounter <= 0){
      pyryCounter = 3;
      showBanner("Pyry!");
      Sfx.freeze();
      let n = 2, g = 0;
      while (n > 0 && g++ < 100){
        const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
        if (types[r][c] >= 0 && !ices[r][c] && !fog[r][c] && specials[r][c] === S_NONE){
          ices[r][c] = true;
          if (tiles[r][c]) tiles[r][c].insertAdjacentHTML("beforeend", '<div class="ice"></div>');
          n--;
        }
      }
      await sleep(dur(350));
    }
  }
  if (!hasValidMove(types, specials, ices)){
    showBanner("Ei siirtoja – sekoitetaan!");
    await sleep(dur(900));
    reshuffle();
  }
}

function reshuffle(){
  Sfx.shuffle();
  const flat = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      flat.push({ t: types[r][c], s: specials[r][c], i: ices[r][c] });
  for (let attempt = 0; attempt < 500; attempt++){
    for (let i = flat.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [flat[i], flat[j]] = [flat[j], flat[i]];
    }
    const tTest = [], sTest = [], iTest = [];
    for (let r = 0; r < ROWS; r++){
      tTest.push([]); sTest.push([]); iTest.push([]);
      for (let c = 0; c < COLS; c++){
        const f = flat[r * COLS + c];
        tTest[r].push(f.t); sTest[r].push(f.s); iTest[r].push(f.i);
      }
    }
    if (findMatches(tTest).size === 0 && hasValidMove(tTest, sTest, iTest)){
      types = tTest;
      specials = sTest;
      ices = iTest;
      rebuildBoardDOM();
      return;
    }
  }
  types = generateTypes();
  specials = emptySpecials();
  ices = emptyBool();
  rebuildBoardDOM();
}

function emptySpecials(){
  return Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => S_NONE));
}

/* =========================================================
   Taival-tila: tasot, sammal ja jää
   ========================================================= */

function emptyBool(){ return Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => false)); }
function emptyNum(){ return Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => 0)); }

function parseLayout(rows){
  ices = emptyBool();
  fog  = emptyBool();
  moss = emptyNum();
  mossLeft = 0;
  mossTotal = 0;
  if (!rows) return;
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      const ch = rows[r][c];
      if (ch === "m")      moss[r][c] = 1;
      else if (ch === "M") moss[r][c] = 2;
      else if (ch === "j") ices[r][c] = true;
      else if (ch === "u") fog[r][c] = true;
      mossLeft += moss[r][c];
    }
  }
  mossTotal = mossLeft;
}

let mossEls = [];
function buildMossEls(){
  boardEl.querySelectorAll(".mosscell").forEach(e => e.remove());
  mossEls = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => null));
  const pad = Math.max(2, tileSize * 0.045);
  for (let r = 0; r < ROWS; r++){
    for (let c = 0; c < COLS; c++){
      if (moss[r][c] > 0){
        const d = document.createElement("div");
        d.className = "mosscell" + (moss[r][c] === 2 ? " m2" : "");
        d.style.left   = (c * tileSize + pad) + "px";
        d.style.top    = (r * tileSize + pad) + "px";
        d.style.width  = (tileSize - pad * 2) + "px";
        d.style.height = (tileSize - pad * 2) + "px";
        boardEl.insertBefore(d, selRing);
        mossEls[r][c] = d;
      }
    }
  }
}

function addMossCell(r, c){
  const pad = Math.max(2, tileSize * 0.045);
  const d = document.createElement("div");
  d.className = "mosscell grow";
  d.style.left   = (c * tileSize + pad) + "px";
  d.style.top    = (r * tileSize + pad) + "px";
  d.style.width  = (tileSize - pad * 2) + "px";
  d.style.height = (tileSize - pad * 2) + "px";
  boardEl.insertBefore(d, selRing);
  mossEls[r][c] = d;
  setTimeout(() => d.classList.remove("grow"), 550);
}

/* Leviävä sammal: jos vuoro ei poiminut sammalta, se valtaa viereisen solun.
   Ehdokas painottuu soluihin, joilla on monta sammaloitunutta naapuria. */
function spreadMoss(){
  const cands = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (moss[r][c] > 0)
        for (const [rr, cc] of [[r-1,c],[r+1,c],[r,c-1],[r,c+1]])
          if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS && moss[rr][cc] === 0)
            cands.push(keyOf(rr, cc));
  if (!cands.length) return;
  const [r, c] = unkey(cands[Math.floor(Math.random() * cands.length)]);
  moss[r][c] = 1;
  mossLeft++;
  mossTotal++;
  addMossCell(r, c);
  renderGoals();
  showBanner("Sammal leviää!");
  Sfx.mossGrow();
}

function updateMossEl(r, c){
  const el = mossEls[r][c];
  if (!el) return;
  if (moss[r][c] <= 0){ el.remove(); mossEls[r][c] = null; }
  else el.classList.remove("m2");
}

function goalsComplete(){
  if (BATTLE) return BATTLE.hp <= 0;
  if (mossLeft > 0) return false;
  if (dropLeft > 0) return false;
  for (const t in collectGoals) if (collectGoals[t] > 0) return false;
  return true;
}

function renderGoals(){
  if (!objMode()){ goalsEl.classList.add("hidden"); return; }
  goalsEl.classList.remove("hidden");
  let html = "";
  for (const t in collectGoals){
    const left = Math.max(0, collectGoals[t]);
    html += `<span class="chip${left === 0 ? " done" : ""}"><span class="ci">${ICONS[t]}</span>${left === 0 ? "✓" : "×" + left}</span>`;
  }
  if (mossTotal > 0){
    html += `<span class="chip${mossLeft <= 0 ? " done" : ""}"><span class="ci">${MOSS_ICON}</span>${mossLeft <= 0 ? "✓" : "×" + mossLeft}</span>`;
  }
  if (dropTotal > 0){
    html += `<span class="chip${dropLeft <= 0 ? " done" : ""}"><span class="ci">${DROP_ICON}</span>${dropLeft <= 0 ? "✓" : "×" + dropLeft}</span>`;
  }
  goalsEl.innerHTML = html;
}

function denyIce(cell){
  Sfx.invalid();
  setSelected(null);
  const el = tiles[cell.r][cell.c];
  if (el){
    el.classList.add("deny");
    setTimeout(() => el.classList.remove("deny"), 350);
  }
}

/* Sadonkorjuu: jäljellä olevat siirrot muuttuvat haravoiksi, jotka
   laukeavat kertarysäyksellä – nopea läpäisy palkitaan näyttävästi. */
async function harvestFinish(){
  showBanner("Sadonkorjuu!");
  Sfx.bornWild();
  await sleep(dur(550));
  const harvestCap = 12 + 6 * perkCount("reppu") + (curseOn("rame") ? 12 : 0) +
    (charIs("poimija") ? 4 : 0) + (permOwned("kori") ? 2 : 0);
  const toConvert = Math.min(moves, harvestCap);
  let converted = 0;
  while (converted < toConvert){
    const cands = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (types[r][c] !== null && types[r][c] >= 0 &&
            specials[r][c] === S_NONE && !ices[r][c])
          cands.push({ r, c });
    if (!cands.length) break;
    const p = cands[Math.floor(Math.random() * cands.length)];
    specials[p.r][p.c] = Math.random() < 0.5 ? S_ROW : S_COL;
    decorateTile(tiles[p.r][p.c], types[p.r][p.c], specials[p.r][p.c]);
    if (tiles[p.r][p.c]) tiles[p.r][p.c].classList.add("born");
    Sfx.born();
    converted++;
    moves--;
    updateStats();
    await sleep(dur(140));
  }
  // katon yli jäävät siirrot pisteinä suoraan
  score += Math.max(0, moves) * 30;
  moves = 0;
  updateStats();
  await sleep(dur(350));
  // laukaise laudan kaikki erikoispalat kerralla
  const set = new Set();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (specials[r][c] !== S_NONE) set.add(keyOf(r, c));
  if (set.size) await resolveCascades(set, null);
}

const bossbarEl = document.getElementById("bossbar");

function renderBossBar(){
  if (!BATTLE){ bossbarEl.classList.add("hidden"); return; }
  bossbarEl.classList.remove("hidden");
  bossbarEl.classList.toggle("enraged", BATTLE.enraged);
  const info = ATTACK_INFO[BATTLE.next];
  const pct = Math.max(0, BATTLE.hp / BATTLE.maxHp * 100);
  const seer = charIs("tietaja") ? " → " + ATTACK_INFO[BATTLE.next2].icon : "";
  bossbarEl.innerHTML =
    `<div class="brow">` +
    `<span class="bname">${BATTLE.enraged ? "🔥 " : ""}${BATTLE.name}</span>` +
    `<span class="btele">${info.icon} ${info.label}${seer} · ${BATTLE.counter} siirron päästä</span>` +
    `</div>` +
    `<div class="btrack"><div class="bfill" style="width:${pct}%"></div>` +
    `<span class="bnum">${Math.max(0, BATTLE.hp)} / ${BATTLE.maxHp}</span></div>`;
}

function dealBossDamage(dmg){
  if (!BATTLE || dmg <= 0) return;
  const charMult = charIs("kaataja") ? (heroUpgraded() ? 1.4 : 1.25) : 1;
  dmg = Math.round(dmg * (BATTLE.dmgMult || 1) * charMult);
  BATTLE.hp -= dmg;
  Sfx.hurt();
  const f = document.createElement("span");
  f.className = "dmgfloat";
  f.textContent = "−" + dmg;
  f.style.color = "#e5b954";
  bossbarEl.appendChild(f);
  setTimeout(() => f.remove(), 950);
  if (!BATTLE.enraged && !BATTLE.mini && BATTLE.hp <= BATTLE.maxHp / 2 && BATTLE.hp > 0){
    BATTLE.enraged = true;
    BATTLE.cadence = 1; // raivo: isku joka siirrolla
    BATTLE.counter = Math.min(BATTLE.counter, 1);
    boardEl.classList.add("enrage");
    showBanner(BATTLE.name + " raivostuu!");
    Sfx.boom();
  }
  renderBossBar();
}

async function performBossAttack(){
  if (BATTLE.skipFirst){
    BATTLE.skipFirst = false;
    showBanner(BATTLE.name + " kompastuu tervaskantoon!");
    Sfx.invalid();
    BATTLE.counter = BATTLE.cadence;
    BATTLE.next = BATTLE.next2;
    BATTLE.next2 = BATTLE.attacks[Math.floor(Math.random() * BATTLE.attacks.length)];
    renderBossBar();
    await sleep(dur(400));
    return;
  }
  const atk = BATTLE.next;
  const info = ATTACK_INFO[atk];
  const power = BATTLE.enraged ? 1 : 0;
  showBanner(`${BATTLE.name}: ${info.icon} ${info.label}!`);
  await sleep(dur(450));
  if (atk === "freeze"){
    Sfx.freeze();
    let n = 2 + power, g = 0;
    while (n > 0 && g++ < 100){
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (types[r][c] >= 0 && !ices[r][c] && specials[r][c] === S_NONE){
        ices[r][c] = true;
        if (tiles[r][c]) tiles[r][c].insertAdjacentHTML("beforeend", '<div class="ice"></div>');
        n--;
      }
    }
  } else if (atk === "moss"){
    Sfx.mossGrow();
    let n = 3 + power, g = 0;
    while (n > 0 && g++ < 100){
      const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
      if (moss[r][c] === 0){
        moss[r][c] = 1;
        mossLeft++; mossTotal++;
        addMossCell(r, c);
        n--;
      }
    }
  } else if (atk === "steal"){
    const sp = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (specials[r][c] !== S_NONE) sp.push({ r, c });
    if (sp.length){
      Sfx.crack();
      const p = sp[Math.floor(Math.random() * sp.length)];
      if (types[p.r][p.c] === T_WILD) types[p.r][p.c] = randType();
      specials[p.r][p.c] = S_NONE;
      if (tiles[p.r][p.c]) decorateTile(tiles[p.r][p.c], types[p.r][p.c], S_NONE);
    } else {
      moves = Math.max(0, moves - 1); // ei ryöstettävää: syö siirron
      updateStats();
    }
    if (BATTLE.enraged){ moves = Math.max(0, moves - 1); updateStats(); }
  } else if (atk === "eat"){
    Sfx.invalid();
    moves = Math.max(0, moves - 1); // kiinteä: raivon paine tulee iskutiheydestä
    updateStats();
  }
  BATTLE.counter = BATTLE.cadence;
  BATTLE.next = BATTLE.next2;
  BATTLE.next2 = BATTLE.attacks[Math.floor(Math.random() * BATTLE.attacks.length)];
  renderBossBar();
  await sleep(dur(300));
}
