function startRun(){
  RUN = {
    act: 1, stage: 1, char: selectedChar,
    score: 0, berries: 0,
    perks: {}, curses: {}, amulets: 0, items: [],
    spec: null, finished: false,
    sinceEnc: 0, pendingDraft: false, lastEnc: null, nextMod: null
  };
  // hahmon aloitusedut
  if (RUN.char === "poimija") RUN.amulets = heroUpgraded() ? 2 : 1;
  if (RUN.char === "kaataja") RUN.perks.puukko = 1;
  // Aitasta pakatut eväät kuluvat nyt
  if (provisions.vaaja){ gainAmulet(); }
  if (provisions.kontti){ grantRandomPerk(); }
  if (provisions.kaaro){ giveMysteryItem(); }
  provisions = {};
  Store.set("provisions", provisions);
  RUN.spec = nextSpec();
  ovBtn.style.display = "";
  overlay.classList.remove("show", "menu");
  newGame();
}

/* kenttien 5 ja 10 pomopaikat ovat taisteluita, muut tavoitekenttiä */
function nextSpec(){
  return (RUN.stage === 5 || RUN.stage === 10)
    ? makeBattleSpec()
    : genRunLevel(runDepth(), false);
}

async function runLevelWin(){
  gameOver = true;
  Sfx.setTension(false);
  if (moves > 0) await harvestFinish();
  Sfx.fanfare();
  RUN.score += Math.round(score * (curseOn("ahneus") ? 1.5 : 1));
  score = 0;
  if (RUN.spec.battle){
    RUN.score += RUN.spec.mini ? 400 : 700;
    if (!RUN.spec.mini) gainAmulet(); // vain pääpomo antaa vaajan
    showBanner((RUN.spec.mini ? "" : "PÄÄPOMO ") + BATTLE.name + " kaatui!" +
      (RUN.spec.mini ? "" : " ⚡"));
    Sfx.crack();
    BATTLE = null;
    renderBossBar();
    boardEl.classList.remove("enrage");
  }
  updateStats();
  renderPerks();
  resetIdle();
  // eteneminen: kenttä 10 päättää aktin
  if (RUN.stage >= 10){
    if (RUN.act >= ACTS.length){ runVictory(); return; }
    RUN.act++;
    RUN.stage = 1;
    RUN.spec = nextSpec();
    actTransition();
    return;
  }
  RUN.stage++;
  await sleep(dur(800));
  proceedBetweenStages();
}

function actTransition(){
  const a = ACTS[RUN.act - 1];
  updateRunRecord();
  const newChar = RUN.act === 2 && unlockChar("tietaja");
  ovTitle.textContent = a.name;
  ovText.innerHTML =
    `${ACTS[RUN.act - 2].boss} kaatui!<br>` +
    `Polku jatkuu kohti aluetta <b>${a.name}</b>.<br>` +
    `Vartijat: ${a.miniboss} ja ${a.boss}.` +
    (newChar ? `<br><span class="record">Uusi hahmo avattu: 🔮 Tietäjä!</span>` : "");
  ovBtn.textContent = "Jatka vaellusta";
  overlay.classList.add("show");
}

function runLevelFail(){
  Sfx.setTension(false);
  gameOver = true;
  resetIdle();
  boardEl.classList.remove("enrage");
  if (RUN.amulets === 0 && RUN.items.includes("ukonkivi")){
    consumeItem("ukonkivi");
    ovTitle.textContent = "Ukonkivi pelasti!";
    ovText.innerHTML = `Kivi murskautuu ja imee iskun – sama kenttä alkaa alusta.`;
    ovBtn.textContent = "Jatka vaellusta";
    overlay.classList.add("show");
    return;
  }
  if (RUN.amulets > 0){
    RUN.amulets--;
    Sfx.crack();
    renderPerks();
    ovTitle.textContent = "Ukonvaaja pelasti!";
    ovText.innerHTML =
      `Vaaja otti iskun vastaan – sama kenttä alkaa alusta.<br>` +
      `Vaajoja jäljellä: <b>${RUN.amulets}</b>`;
    ovBtn.textContent = "Jatka vaellusta";
    overlay.classList.add("show");
    return;
  }
  Sfx.gameOver();
  RUN.score += score;
  score = 0;
  RUN.finished = true;
  const rec = updateRunRecord();
  const banked = bankBerries(RUN.berries);
  ovTitle.textContent = "Vaellus päättyi";
  ovText.innerHTML =
    `Matka: <b>${RUN.act}. korpi · ${RUN.stage}/10</b> · Saalis: <b>${RUN.score}</b> p` +
    `<br>Aittaan: <b>+${banked}</b> 🫐 (yhteensä ${aitta})` +
    (rec ? `<br><span class="record">Uusi ennätys!</span>` : "");
  ovBtn.textContent = "Päävalikkoon";
  overlay.classList.add("show");
}

function runVictory(){
  gameOver = true;
  RUN.finished = true;
  const rec = updateRunRecord();
  const banked = bankBerries(RUN.berries);
  resetIdle();
  const newChar = unlockChar("kaataja");
  ovTitle.textContent = "Louhi on lyöty!";
  ovText.innerHTML =
    `Koko vaellus taitettu – kolme aktia ja kolmekymmentä kenttää!<br>` +
    `Saalis: <b>${RUN.score}</b> pistettä` +
    `<br>Aittaan: <b>+${banked}</b> 🫐 (yhteensä ${aitta})` +
    (newChar ? `<br><span class="record">Uusi hahmo avattu: 🗡️ Karhunkaataja!</span>` : "") +
    (rec ? `<br><span class="record">Uusi ennätys!</span>` : "");
  ovBtn.textContent = "Päävalikkoon";
  overlay.classList.add("show");
}

function updateRunRecord(){
  const prog = (RUN.act - 1) * 10 + RUN.stage;
  const old = record ? (record.act - 1) * 10 + record.stage : 0;
  const better = !record || prog > old || (prog === old && RUN.score > record.score);
  if (better){
    record = { act: RUN.act, stage: RUN.stage, score: RUN.score };
    Store.set("record", record);
  }
  return better;
}

/* Varustevalinta: kaksi varustetta + kolmas paikka (kirous/vaaja/varuste) */
function openDraft(){
  const slots = [];
  const unmaxed = () => Object.keys(PERKS).filter(id =>
    (RUN.perks[id] || 0) < PERKS[id].max && !slots.some(s => s.id === id));
  const takePerk = () => {
    const cand = unmaxed();
    return cand.length ? { kind: "perk", id: cand[Math.floor(Math.random() * cand.length)] } : null;
  };
  const p1 = takePerk(); if (p1) slots.push(p1);
  const p2 = takePerk(); if (p2) slots.push(p2);
  const roll = Math.random();
  const freeCurses = Object.keys(CURSES).filter(id => !RUN.curses[id]);
  if (roll < 0.25 && freeCurses.length)
    slots.push({ kind: "curse", id: freeCurses[Math.floor(Math.random() * freeCurses.length)] });
  else if (roll < 0.42 && RUN.amulets < AMULET_CAP)
    slots.push({ kind: "amulet" });
  else {
    const p3 = takePerk();
    slots.push(p3 || { kind: "amulet" });
  }
  if (!slots.length) slots.push({ kind: "amulet" });

  draftCards.innerHTML = trailHTML() + slots.map((s, i) => {
    const item = s.kind === "perk" ? PERKS[s.id]
               : s.kind === "curse" ? CURSES[s.id]
               : AMULET;
    const owned = s.kind === "perk" && RUN.perks[s.id] ? ` (omistat ×${RUN.perks[s.id]})` : "";
    const name = item.name;
    const cls = s.kind === "curse" ? " curse" : s.kind === "amulet" ? " amu" : "";
    return `<button class="card${cls}" data-i="${i}">` +
      `<span class="cicon">${item.icon}</span>` +
      `<span class="cname">${name}${owned}</span>` +
      `<span class="cdesc">${item.desc}</span></button>`;
  }).join("");
  draftCards.querySelectorAll(".card").forEach(btn => {
    btn.addEventListener("click", () => {
      const s = slots[+btn.dataset.i];
      if (s.kind === "perk")       RUN.perks[s.id] = (RUN.perks[s.id] || 0) + 1;
      else if (s.kind === "curse") RUN.curses[s.id] = true;
      else                         gainAmulet();
      Sfx.born();
      draftOverlay.classList.remove("show");
      RUN.spec = nextSpec();
      newGame();
    });
  });
  draftOverlay.classList.add("show");
}

function randomFreeCurse(){
  const free = Object.keys(CURSES).filter(id => !RUN.curses[id]);
  return free.length ? free[Math.floor(Math.random() * free.length)] : null;
}
function grantRandomPerk(){
  const cand = Object.keys(PERKS).filter(id => (RUN.perks[id] || 0) < PERKS[id].max);
  if (!cand.length) return null;
  const id = cand[Math.floor(Math.random() * cand.length)];
  RUN.perks[id] = (RUN.perks[id] || 0) + 1;
  return id;
}
function giveMysteryItem(){
  const cand = Object.keys(MYSTERY_ITEMS).filter(id => !RUN.items.includes(id));
  if (!cand.length) return null;
  const id = cand[Math.floor(Math.random() * cand.length)];
  RUN.items.push(id);
  return id;
}
function consumeItem(id){
  const i = RUN.items.indexOf(id);
  if (i === -1) return false;
  RUN.items.splice(i, 1);
  showBanner(`❓ ${MYSTERY_ITEMS[id].name}: ${MYSTERY_ITEMS[id].reveal}`);
  Sfx.born();
  renderPerks();
  return true;
}

function shopCard(g, state, note){
  // state: "buy" | "soldout" | "locked"
  const dis = state !== "buy";
  const price = state === "soldout" ? "✓" : state === "locked" ? "🔒" : g.price + " 🫐";
  return `<button class="card shopitem${dis ? (state === "soldout" ? " disabled soldout" : " disabled") : ""}"` +
    ` data-id="${g.id}" ${dis ? "disabled" : ""}>` +
    `<span class="cicon">${g.icon}</span>` +
    `<span class="cname">${g.name}</span>` +
    `<span class="cprice">${price}</span>` +
    `<span class="cdesc">${note || g.desc}</span></button>`;
}

function renderShop(){
  shopBalance.textContent = "Varannossa: " + aitta + " 🫐";
  let html = `<div class="shop-section">Pysyvät parannukset</div><div class="cards">`;
  html += AITTA_GOODS.perm.map(g =>
    shopCard(g, owned[g.id] ? "soldout" : aitta >= g.price ? "buy" : "locked",
             owned[g.id] ? g.desc + " (hankittu)" : aitta < g.price ? g.desc : null)).join("");
  html += `</div><div class="shop-section">Eväät seuraavalle vaellukselle</div><div class="cards">`;
  html += AITTA_GOODS.once.map(g =>
    shopCard(g, provisions[g.id] ? "soldout" : aitta >= g.price ? "buy" : "locked",
             provisions[g.id] ? g.desc + " (pakattu)" : null)).join("");
  html += `</div><div class="shop-section">Hahmonkehitys</div><div class="cards">`;
  html += AITTA_GOODS.hero.map(g => {
    const open = g.char === "poimija" || unlocks[g.char];
    const state = !open ? "locked" : owned[g.id] ? "soldout" : aitta >= g.price ? "buy" : "locked";
    const note = !open ? CHARS[g.char].unlock
               : owned[g.id] ? g.desc + " (hankittu)" : null;
    return shopCard(g, state, note);
  }).join("");
  html += `</div>`;
  shopBody.innerHTML = html;
  shopBody.querySelectorAll(".card:not(.disabled)").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.id;
      const g = [...AITTA_GOODS.perm, ...AITTA_GOODS.once, ...AITTA_GOODS.hero]
        .find(x => x.id === id);
      if (!g || aitta < g.price) return;
      aitta -= g.price;
      Store.set("aitta", aitta);
      if (AITTA_GOODS.once.some(x => x.id === id)){
        provisions[id] = true;
        Store.set("provisions", provisions);
      } else {
        owned[id] = true;
        Store.set("owned", owned);
      }
      Sfx.born();
      renderShop();
    });
  });
}

function openShop(){
  renderShop();
  shopOverlay.classList.add("show");
}
document.getElementById("shopClose").addEventListener("click", () => {
  shopOverlay.classList.remove("show");
  showMainMenu();
});

/* Matkajana: aktin 10 kenttää, ⚔ = miniboss, 👑 = pomo */
function trailHTML(){
  if (!RUN) return "";
  let s = `<div class="trail">`;
  for (let i = 1; i <= 10; i++){
    const cls = (i < RUN.stage ? " done" : "") + (i === RUN.stage ? " cur" : "");
    const mark = i === 10 ? "👑" : i === 5 ? "⚔️" : i;
    s += `<span class="tnode${cls}">${mark}</span>`;
    if (i < 10) s += `<span class="tlink${i < RUN.stage ? " done" : ""}"></span>`;
  }
  return s + `</div><div class="trail-label">${["Ensimmäinen","Toinen","Kolmas"][RUN.act - 1]} korpi · ${ACTS[RUN.act - 1].name}</div>`;
}

function proceedBetweenStages(){
  RUN.sinceEnc = (RUN.sinceEnc || 0) + 1;
  if (RUN.sinceEnc >= 2 && Math.random() < (permOwned("kartta") ? 0.8 : 0.6)){
    RUN.sinceEnc = 0;
    RUN.pendingDraft = true; // kohtaamisen jälkeen vielä varustevalinta
    openEncounter();
  } else {
    openDraft();
  }
}

function afterEncounter(){
  encOverlay.classList.remove("show");
  miniOverlay.classList.remove("show");
  updateStats();
  renderPerks();
  if (RUN.pendingDraft){
    RUN.pendingDraft = false;
    openDraft();
  } else {
    RUN.spec = nextSpec();
    newGame();
  }
}

function openEncounter(forced){
  const pool = ENCOUNTERS.filter(e =>
    (!e.act || e.act === RUN.act) && e.id !== RUN.lastEnc);
  const enc = forced || pool[Math.floor(Math.random() * pool.length)];
  RUN.lastEnc = enc.id;
  encBody.innerHTML = trailHTML() +
    `<div class="enc-head">${enc.icon}</div>` +
    `<h2>${enc.title}</h2>` +
    `<p class="enc-text">${enc.text}</p>` +
    `<div class="cards">` +
    enc.choices.map((ch, i) => {
      let locked = null;
      if (ch.requires && !perkCount(ch.requires))
        locked = `Vaatii: ${PERKS[ch.requires].icon} ${PERKS[ch.requires].name}`;
      else if (ch.requiresAnyPerk && !Object.keys(RUN.perks).length)
        locked = "Vaatii: vähintään yksi varuste";
      else if (ch.minScore && RUN.score + score < ch.minScore)
        locked = `Vaatii: ${ch.minScore} p`;
      return `<button class="card${locked ? " disabled" : ""}" data-i="${i}" ${locked ? "disabled" : ""}>` +
        `<span class="cicon">${enc.icon}</span>` +
        `<span class="cname">${ch.label}</span>` +
        `<span class="cdesc">${locked || ch.desc}</span></button>`;
    }).join("") +
    `</div>`;
  encBody.querySelectorAll(".card:not(.disabled)").forEach(btn => {
    btn.addEventListener("click", () => {
      const res = enc.choices[+btn.dataset.i].act();
      if (res && res.minigame){
        encOverlay.classList.remove("show");
        launchMinigame(res.minigame);
        return;
      }
      Sfx.select();
      encBody.innerHTML =
        `<div class="enc-head">${enc.icon}</div>` +
        `<h2>${enc.title}</h2>` +
        `<p class="enc-result">${res}</p>` +
        `<button class="btn small guide-close" id="encContinue">Jatka vaellusta</button>`;
      document.getElementById("encContinue").addEventListener("click", afterEncounter);
    });
  });
  encOverlay.classList.add("show");
}

/* =========================================================
   Polunhaarat: minipelien käynnistys ja palkkiot
   ========================================================= */

const miniOverlay = document.getElementById("miniOverlay");
const miniCanvas  = document.getElementById("miniCanvas");
const miniResult  = document.getElementById("miniResult");

function launchMinigame(id){
  miniResult.classList.add("hidden");
  miniOverlay.classList.add("show");
  MINIGAMES[id].start(gates => finishMinigame(gates));
}

function finishMinigame(gates){
  const tiers = branchRewardTiers(gates);
  const lines = [`Matka: <b>${gates}</b> porttia`];
  if (tiers.pot > 0){
    RUN.score += tiers.pot;
    lines.push(`Pistepotti: <b>+${tiers.pot}</b>`);
  }
  if (tiers.perk){
    const cand = Object.keys(PERKS).filter(id => (RUN.perks[id] || 0) < PERKS[id].max);
    if (cand.length){
      const id = cand[Math.floor(Math.random() * cand.length)];
      RUN.perks[id] = (RUN.perks[id] || 0) + 1;
      lines.push(`Varuste: ${PERKS[id].icon} <b>${PERKS[id].name}</b>`);
    } else {
      gainAmulet();
      lines.push(`${AMULET.icon} <b>Ukonvaaja</b> (varusteet täynnä)`);
    }
  }
  if (tiers.amulet){
    gainAmulet();
    lines.push(`${AMULET.icon} <b>Ukonvaaja!</b>`);
  }
  if (tiers.pot === 0) lines.push("Ei saalista tällä kertaa.");
  (gates >= 5 ? Sfx.fanfare : Sfx.gameOver)();
  miniResult.innerHTML =
    `<h2>${gates >= 15 ? "Mestarilento!" : gates >= 5 ? "Hyvä lento!" : "Maihinlasku"}</h2>` +
    `<div class="lines">${lines.join("<br>")}</div>` +
    `<button class="btn small" id="miniContinue">Jatka vaellusta</button>`;
  miniResult.classList.remove("hidden");
  document.getElementById("miniContinue").addEventListener("click", afterEncounter);
}

/* =========================================================
   Käpylintu – flappy-lento kuusikon halki
   ========================================================= */

function startKapylintu(onDone){
  const ctx = miniCanvas.getContext("2d");
  const W = miniCanvas.width, H = miniCanvas.height;
  const GROUND = 26, BIRD_X = 92, BIRD_R = 11, OB_W = 56, SPACING = 208;
  const GRAVITY = 0.34, FLAP_V = -6.2, MAX_FALL = 7.5; // 60 fps -yksiköissä

  let bird = { y: H / 2, vy: 0 };
  let obstacles = [];
  let gates = 0, started = false, dead = false, doneCalled = false;
  let scroll = 0, t = 0, raf = null, lastTime = 0;

  // tulikärpäset tunnelmaksi
  const flies = Array.from({ length: 10 }, () => ({
    x: Math.random() * W, y: 60 + Math.random() * (H - 140),
    p: Math.random() * Math.PI * 2
  }));

  const speed = () => 2.4 + Math.min(1.1, gates * 0.075);
  const gapH  = () => Math.max(126, 168 - gates * 2.6);

  function spawn(x){
    const gh = gapH();
    const gy = 60 + Math.random() * (H - GROUND - gh - 120);
    obstacles.push({ x, gy, gh, passed: false });
  }
  spawn(W + 120); spawn(W + 120 + SPACING);

  function flap(){
    if (dead) return;
    started = true;
    bird.vy = FLAP_V;
    Sfx.swap();
  }

  function die(){
    if (dead) return;
    dead = true;
    Sfx.boom();
    setTimeout(finish, 750);
  }

  function finish(){
    if (doneCalled) return;
    doneCalled = true;
    cancelAnimationFrame(raf);
    miniCanvas.removeEventListener("pointerdown", flap);
    document.removeEventListener("keydown", onKey);
    onDone(gates);
  }

  function onKey(e){
    if (e.key === " " || e.key === "ArrowUp"){ e.preventDefault(); flap(); }
  }
  miniCanvas.addEventListener("pointerdown", flap);
  document.addEventListener("keydown", onKey);

  function drawTreeline(offset, baseY, s, color){
    ctx.fillStyle = color;
    const w = 46 * s;
    for (let x = -(offset % w) - w; x < W + w; x += w){
      ctx.beginPath();
      ctx.moveTo(x, baseY);
      ctx.lineTo(x + w / 2, baseY - 52 * s);
      ctx.lineTo(x + w, baseY);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawSpruceUp(x, w, topY){
    // kuusi alhaalta ylös: runko + latvakerrokset
    ctx.fillStyle = "#4a3016";
    ctx.fillRect(x + w / 2 - 5, topY, 10, H - GROUND - topY);
    ctx.fillStyle = "#2c4a34";
    const layers = Math.max(2, Math.floor((H - GROUND - topY) / 46));
    for (let i = 0; i < layers; i++){
      const y = topY + i * 44;
      const half = w / 2 + 6 - i * 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y - 14);
      ctx.lineTo(x + w / 2 - half, y + 40);
      ctx.lineTo(x + w / 2 + half, y + 40);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawBranchDown(x, w, botY){
    // ylhäältä roikkuva oksisto
    ctx.fillStyle = "#4a3016";
    ctx.fillRect(x + w / 2 - 5, 0, 10, botY);
    ctx.fillStyle = "#243f2c";
    const layers = Math.max(2, Math.floor(botY / 46));
    for (let i = 0; i < layers; i++){
      const y = botY - i * 44;
      const half = w / 2 + 6 - i * 1.5;
      ctx.beginPath();
      ctx.moveTo(x + w / 2, y + 14);
      ctx.lineTo(x + w / 2 - half, y - 40);
      ctx.lineTo(x + w / 2 + half, y - 40);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawBird(){
    ctx.save();
    ctx.translate(BIRD_X, bird.y);
    ctx.rotate(Math.max(-0.45, Math.min(0.7, bird.vy * 0.06)));
    // talitiainen: keltainen vatsa, tumma pää, valkoinen poski
    ctx.fillStyle = "#e8c545";
    ctx.beginPath(); ctx.ellipse(0, 1, 12, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2b3438";
    ctx.beginPath(); ctx.ellipse(8, -4, 6.5, 5.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#f2edde";
    ctx.beginPath(); ctx.ellipse(9.5, -3, 3, 2.6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#c08c25";
    ctx.beginPath(); ctx.moveTo(13, -4); ctx.lineTo(19, -3); ctx.lineTo(13, -1.5); ctx.closePath(); ctx.fill();
    // siipi räpyttää
    const wing = Math.sin(t * (bird.vy < 0 ? 0.9 : 0.3)) * 6;
    ctx.fillStyle = "#3c4a50";
    ctx.beginPath(); ctx.ellipse(-3, wing * 0.4, 8, 4.5, -0.4 + wing * 0.05, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function loop(now){
    // aikapohjainen fysiikka: dt = 1 tarkoittaa 60 fps -askelta,
    // joten peli tuntuu samalta 60, 90 ja 120 Hz näytöillä
    if (!lastTime) lastTime = now;
    const dt = Math.min(2.5, (now - lastTime) / 16.667);
    lastTime = now;
    t += dt;
    if (started && !dead){
      // eksakti ballistinen askel: paikka keskinopeudella, sitten nopeus
      bird.y += (bird.vy + 0.5 * GRAVITY * dt) * dt;
      bird.vy = Math.min(MAX_FALL, bird.vy + GRAVITY * dt);
      if (bird.y < 14){ bird.y = 14; bird.vy = 0; }
      scroll += speed() * dt;
      for (const o of obstacles) o.x -= speed() * dt;
      if (obstacles[obstacles.length - 1].x < W - SPACING) spawn(W + 60);
      obstacles = obstacles.filter(o => o.x > -OB_W - 10);
      // törmäykset ja portit
      if (bird.y + BIRD_R > H - GROUND) die();
      for (const o of obstacles){
        if (BIRD_X + BIRD_R > o.x && BIRD_X - BIRD_R < o.x + OB_W){
          if (bird.y - BIRD_R < o.gy || bird.y + BIRD_R > o.gy + o.gh) die();
        }
        if (!o.passed && o.x + OB_W < BIRD_X - BIRD_R){
          o.passed = true;
          gates++;
          if (gates === 5 || gates === 10 || gates === 15) Sfx.born();
          else Sfx.select();
        }
      }
    }
    // ---- piirto ----
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0e1a13"); g.addColorStop(1, "#1d2f23");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    drawTreeline(scroll * 0.25, H - GROUND - 8, 1.5, "rgba(20,36,27,.8)");
    drawTreeline(scroll * 0.5,  H - GROUND - 2, 0.9, "rgba(28,47,35,.9)");
    ctx.fillStyle = "#7fae6f";
    for (const f of flies){
      const a = 0.25 + 0.35 * (0.5 + Math.sin(t * 0.05 + f.p) / 2);
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc((f.x - scroll * 0.35 % W + W * 2) % W, f.y + Math.sin(t * 0.02 + f.p) * 8, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    for (const o of obstacles){
      drawBranchDown(o.x, OB_W, o.gy);
      drawSpruceUp(o.x, OB_W, o.gy + o.gh);
    }
    ctx.fillStyle = "#17251c";
    ctx.fillRect(0, H - GROUND, W, GROUND);
    ctx.fillStyle = "#24402e";
    ctx.fillRect(0, H - GROUND, W, 5);
    drawBird();
    // HUD
    ctx.fillStyle = "#f2edde";
    ctx.font = "800 22px Manrope, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("Portit: " + gates, 14, 32);
    ctx.font = "700 12px Manrope, sans-serif";
    ctx.fillStyle = "rgba(229,185,84,.85)";
    ctx.fillText("5 · 10 · 15 = palkkiot", 14, 50);
    if (!started){
      ctx.textAlign = "center";
      ctx.fillStyle = "#f2edde";
      ctx.font = "800 20px Manrope, sans-serif";
      ctx.fillText("Napauta lentääksesi", W / 2, H / 2 - 60);
      ctx.font = "700 13px Manrope, sans-serif";
      ctx.fillStyle = "rgba(242,237,222,.7)";
      ctx.fillText("välilyönti tai kosketus räpyttää", W / 2, H / 2 - 38);
    }
    if (!doneCalled) raf = requestAnimationFrame(loop);
  }
  raf = requestAnimationFrame(loop);
}

/* =========================================================
   Suohyppely – loikinta mättäiltä ajelehtiville tukeille
   ========================================================= */

function startSuohyppely(onDone){
  const ctx = miniCanvas.getContext("2d");
  const W = miniCanvas.width, H = miniCanvas.height;
  const LANES = 7, CELL = W / LANES, ROWH = 54;

  // rivit maailmakoordinaateissa: 0 = lähtö, kasvaa ylöspäin
  const rows = [];
  function rowDef(i){
    while (rows.length <= i){
      const k = rows.length;
      if (k < 2 || k % 3 === 0 || Math.random() < 0.22){
        rows.push({ type: "safe", tufts: Array.from({length: 4}, () => Math.random() * W) });
      } else {
        const logW = Math.max(1.5, 2.5 - k * 0.035) * CELL;
        const gap  = (2.1 + Math.random() * 1.2) * CELL;
        rows.push({
          type: "water",
          dir: Math.random() < 0.5 ? 1 : -1,
          speed: (0.55 + k * 0.028 + Math.random() * 0.25) * CELL / 60,
          logW, span: logW + gap,
          offset: Math.random() * (logW + gap)
        });
      }
    }
    return rows[i];
  }
  const logsAt = (row, t) => {
    // tukin vasemmat reunat hetkellä t (px, jaksollinen)
    const base = ((row.offset + row.dir * row.speed * t) % row.span + row.span) % row.span;
    const out = [];
    for (let x = base - row.span * 2; x < W + row.span; x += row.span) out.push(x);
    return out;
  };
  const onLogX = (row, t, px) => {
    for (const lx of logsAt(row, t))
      if (px >= lx - 4 && px <= lx + row.logW + 4) return lx;
    return null;
  };

  let player = { row: 0, x: W / 2, squash: 0 };
  let gates = 0, started = false, dead = false, doneCalled = false;
  let cam = -20;               // maailman y-kohta ruudun alareunassa
  let t = 0, raf = null, lastTime = 0;
  const worldY = r => r * ROWH;
  const screenY = r => H - 46 - (worldY(r) - cam);

  function hop(dc, dr){
    if (dead) return;
    started = true;
    const nr = Math.max(0, player.row + dr);
    rowDef(nr + 8);
    player.row = nr;
    if (dc) player.x = Math.min(W - CELL / 2, Math.max(CELL / 2,
      (Math.round(player.x / CELL - 0.5) + dc + 0.5) * CELL));
    player.squash = 1;
    gates = Math.max(gates, player.row);
    Sfx.swap();
    if (gates === 5 || gates === 10 || gates === 15) Sfx.born();
  }
  function die(splash){
    if (dead) return;
    dead = true;
    Sfx[splash ? "invalid" : "boom"]();
    setTimeout(finish, 750);
  }
  function finish(){
    if (doneCalled) return;
    doneCalled = true;
    cancelAnimationFrame(raf);
    miniCanvas.removeEventListener("pointerdown", onTap);
    document.removeEventListener("keydown", onKey);
    onDone(gates);
  }
  function onTap(e){
    const rect = miniCanvas.getBoundingClientRect();
    const px = (e.clientX - rect.left) / rect.width;
    const py = (e.clientY - rect.top) / rect.height;
    if (py > 0.7 && px < 0.33) hop(-1, 0);
    else if (py > 0.7 && px > 0.67) hop(1, 0);
    else hop(0, 1);
  }
  function onKey(e){
    if (e.key === "ArrowUp"){ e.preventDefault(); hop(0, 1); }
    else if (e.key === "ArrowLeft"){ e.preventDefault(); hop(-1, 0); }
    else if (e.key === "ArrowRight"){ e.preventDefault(); hop(1, 0); }
  }
  miniCanvas.addEventListener("pointerdown", onTap);
  document.addEventListener("keydown", onKey);
  rowDef(12);

  function loop(now){
    if (!lastTime) lastTime = now;
    const dt = Math.min(2.5, (now - lastTime) / 16.667);
    lastTime = now;
    t += dt;
    if (started && !dead){
      const row = rowDef(player.row);
      if (row.type === "water"){
        const lx = onLogX(row, t, player.x);
        if (lx === null) die(true);
        else player.x += row.dir * row.speed * dt;
        if (player.x < -6 || player.x > W + 6) die(false);
      }
      // kamera valuu perässä ja kiihtyy
      cam += (0.16 + gates * 0.012) * dt;
      cam = Math.max(cam, worldY(player.row) - H * 0.62);
      if (screenY(player.row) > H - 14) die(false); // jäit jälkeen
    }
    player.squash = Math.max(0, player.squash - 0.12 * dt);
    // ---- piirto ----
    ctx.fillStyle = "#20301f";
    ctx.fillRect(0, 0, W, H);
    const r0 = Math.max(0, Math.floor(cam / ROWH) - 1);
    for (let i = r0; i < r0 + Math.ceil(H / ROWH) + 3; i++){
      const row = rowDef(i), y = screenY(i);
      if (row.type === "safe"){
        ctx.fillStyle = i % 2 ? "#33502c" : "#2d4827";
        ctx.fillRect(0, y - ROWH + 6, W, ROWH);
        ctx.fillStyle = "#4a6a3a";
        for (const tx of row.tufts){
          ctx.beginPath();
          ctx.ellipse(tx, y - 12, 9, 4.5, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        ctx.fillStyle = "#17262d";
        ctx.fillRect(0, y - ROWH + 6, W, ROWH);
        ctx.strokeStyle = "rgba(120,160,170,.18)";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        const wob = (t * row.speed * row.dir * 2) % 26;
        for (let x = -26 + wob; x < W + 26; x += 26){
          ctx.moveTo(x, y - 22);
          ctx.quadraticCurveTo(x + 7, y - 26, x + 14, y - 22);
        }
        ctx.stroke();
        for (const lx of logsAt(row, t)){
          ctx.fillStyle = "#6a4a26";
          ctx.beginPath();
          ctx.roundRect(lx, y - 38, row.logW, 26, 12);
          ctx.fill();
          ctx.strokeStyle = "#513618";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(lx + 8, y - 25); ctx.lineTo(lx + row.logW - 8, y - 25);
          ctx.stroke();
        }
      }
    }
    // sammakko
    const py = screenY(player.row) - 24;
    const sq = 1 + player.squash * 0.25;
    ctx.save();
    ctx.translate(player.x, py);
    ctx.scale(sq, 2 - sq);
    ctx.fillStyle = "#5d8a3c";
    ctx.beginPath(); ctx.ellipse(0, 0, 13, 11, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#79a852";
    ctx.beginPath(); ctx.ellipse(0, -3, 9, 6.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-5, -9, 3.4, 0, Math.PI * 2); ctx.arc(5, -9, 3.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.arc(-5, -9.5, 1.5, 0, Math.PI * 2); ctx.arc(5, -9.5, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // HUD
    ctx.fillStyle = "#f2edde";
    ctx.font = "800 22px Manrope, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("Rivit: " + gates, 14, 32);
    ctx.font = "700 12px Manrope, sans-serif";
    ctx.fillStyle = "rgba(229,185,84,.85)";
    ctx.fillText("5 · 10 · 15 = palkkiot", 14, 50);

      ctx.fillStyle = "#f2edde";

}

/* =========================================================
   Ahkio – väistelylasku tunturinrinnettä alas
   ========================================================= */

function startAhkio(onDone){
  const ctx = miniCanvas.getContext("2d");
  const W = miniCanvas.width, H = miniCanvas.height;
  const SLED_Y = 118, SLED_W = 26;

  let x = W / 2, vx = 0, dir = 0;
  let gates = 0, started = false, dead = false, doneCalled = false;
  let t = 0, raf = null, lastTime = 0;
  const snow = Array.from({ length: 26 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    s: 0.6 + Math.random() * 1.2
  }));
  const speed = () => 2.5 + Math.min(2.2, gates * 0.09);
  const gapW  = () => Math.max(92, 128 - gates * 2.2);

  // esteet: porttirivit ja irtopuut, liikkuvat ylöspäin (lasku alas)
  let obs = [];
  function spawnRow(y){
    obs.push({ kind: "row", y, gapX: 30 + Math.random() * (W - 60 - gapW()), passed: false });
    if (Math.random() < 0.4)
      obs.push({ kind: "tree", y: y + 85, x: 20 + Math.random() * (W - 40) });
  }
  spawnRow(H + 60); spawnRow(H + 230);

  function die(){
    if (dead) return;
    dead = true;
    Sfx.boom();
    setTimeout(finish, 750);
  }
  function finish(){
    if (doneCalled) return;
    doneCalled = true;
    cancelAnimationFrame(raf);
    miniCanvas.removeEventListener("pointerdown", onDown);
    miniCanvas.removeEventListener("pointermove", onMove);
    miniCanvas.removeEventListener("pointerup", onUp);
    document.removeEventListener("keydown", onKeyD);
    document.removeEventListener("keyup", onKeyU);
    onDone(gates);
  }
  function setDirFromEvent(e){
    const rect = miniCanvas.getBoundingClientRect();
    dir = (e.clientX - rect.left) / rect.width < 0.5 ? -1 : 1;
    started = true;
  }
  function onDown(e){ setDirFromEvent(e); }
  function onMove(e){ if (e.buttons) setDirFromEvent(e); }
  function onUp(){ dir = 0; }
  function onKeyD(e){
    if (e.key === "ArrowLeft"){ e.preventDefault(); dir = -1; started = true; }
    else if (e.key === "ArrowRight"){ e.preventDefault(); dir = 1; started = true; }
  }
  function onKeyU(e){
    if (e.key === "ArrowLeft" && dir === -1) dir = 0;
    if (e.key === "ArrowRight" && dir === 1) dir = 0;
  }
  miniCanvas.addEventListener("pointerdown", onDown);
  miniCanvas.addEventListener("pointermove", onMove);
  miniCanvas.addEventListener("pointerup", onUp);
  document.addEventListener("keydown", onKeyD);
  document.addEventListener("keyup", onKeyU);

  function drawTree(px, py, s){
    ctx.fillStyle = "#22392b";
    ctx.beginPath();
    ctx.moveTo(px, py - 26 * s);
    ctx.lineTo(px - 13 * s, py);
    ctx.lineTo(px + 13 * s, py);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px, py - 38 * s);
    ctx.lineTo(px - 9 * s, py - 16 * s);
    ctx.lineTo(px + 9 * s, py - 16 * s);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#e8edf2";
    ctx.beginPath();
    ctx.ellipse(px, py - 30 * s, 7 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  function loop(now){
    if (!lastTime) lastTime = now;
    const dt = Math.min(2.5, (now - lastTime) / 16.667);
    lastTime = now;
    t += dt;
    if (started && !dead){
      vx += dir * 0.5 * dt;
      vx *= Math.pow(0.92, dt);
      x = Math.min(W - 16, Math.max(16, x + vx * dt));
      for (const o of obs) o.y -= speed() * dt;
      if (obs[obs.length - 1].y < H - 130) spawnRow(H + 60);
      obs = obs.filter(o => o.y > -60);
      for (const o of obs){
        if (o.kind === "row"){
          if (Math.abs(o.y - SLED_Y) < 26 &&
              (x - SLED_W / 2 < o.gapX || x + SLED_W / 2 > o.gapX + gapW())) die();
          if (!o.passed && o.y < SLED_Y - 26){
            o.passed = true;
            gates++;
            (gates === 5 || gates === 10 || gates === 15 ? Sfx.born : Sfx.select)();
          }
        } else if (Math.abs(o.y - SLED_Y) < 24 && Math.abs(o.x - x) < 20){
          die();
        }
      }
    }
    // ---- piirto ----
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#dfe8ef"); g.addColorStop(1, "#b8c9d6");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // laskujäljet
    ctx.strokeStyle = "rgba(150,170,185,.4)";
    ctx.lineWidth = 3;
    for (const off of [-9, 9]){
      ctx.beginPath();
      ctx.moveTo(x + off, SLED_Y);
      ctx.quadraticCurveTo(x + off - vx * 6, SLED_Y - 46, x + off - vx * 14, SLED_Y - 95);
      ctx.stroke();
    }
    for (const o of obs){
      if (o.kind === "row"){
        for (let px = 16; px < W - 8; px += 34)
          if (px < o.gapX - 6 || px > o.gapX + gapW() + 6) drawTree(px, o.y, 1);
        ctx.fillStyle = "#c8443c";
        ctx.fillRect(o.gapX - 3, o.y - 30, 4, 30);
        ctx.fillRect(o.gapX + gapW() - 1, o.y - 30, 4, 30);
      } else {
        drawTree(o.x, o.y, 1.25);
      }
    }
    // ahkio
    ctx.save();
    ctx.translate(x, SLED_Y);
    ctx.rotate(Math.max(-0.4, Math.min(0.4, vx * 0.08)));
    ctx.fillStyle = "#a33528";
    ctx.beginPath(); ctx.roundRect(-SLED_W / 2, -8, SLED_W, 30, 7); ctx.fill();
    ctx.fillStyle = "#e8c545";
    ctx.beginPath(); ctx.arc(0, -2, 7, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2b3438";
    ctx.beginPath(); ctx.arc(0, -6, 4.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    // lumisade
    ctx.fillStyle = "rgba(255,255,255,.85)";
    for (const f of snow){
      f.y += (f.s + speed() * 0.4) * dt;
      f.x += Math.sin(t * 0.02 + f.s * 7) * 0.4 * dt;
      if (f.y > H){ f.y = -4; f.x = Math.random() * W; }
      ctx.beginPath(); ctx.arc(f.x, f.y, f.s, 0, Math.PI * 2); ctx.fill();
    }
    // HUD
    ctx.fillStyle = "#2b3a46";
    ctx.font = "800 22px Manrope, sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("Portit: " + gates, 14, 32);
    ctx.font = "700 12px Manrope, sans-serif";
    ctx.fillStyle = "rgba(120,90,20,.85)";
    ctx.fillText("5 · 10 · 15 = palkkiot", 14, 50);
    if (!started){
      ctx.textAlign = "center";
      ctx.fillStyle = "#2b3a46";
      ctx.font = "800 20px Manrope, sans-serif";
      ctx.fillText("Paina ja pidä ohjataksesi", W / 2, H / 2 - 60);
      ctx.font = "700 13px Manrope, sans-serif";
      ctx.fillStyle = "rgba(43,58,70,.7)";
      ctx.fillText("vasen / oikea puoli kallistaa", W / 2, H / 2 - 38);
    }
    if (!doneCalled) raf = requestAnimationFrame(loop);
  }
  raf = requestAnimationFrame(loop);
}

function newGame(){
  overlay.classList.remove("show", "menu");
  ovBtn.style.display = "";
  score = 0;
  longestChain = 1;
  specialsMade = 0;
  gameOver = false;
  busy = false;
  Sfx.setTension(false);
  setSelected(null);

  if (!RUN){ showMainMenu(); return; }
  ICONS = ICON_SETS[Math.min(3, RUN.act) - 1];
  document.body.className = RUN.act >= 2 ? "act-" + Math.min(3, RUN.act) : "";
  pyryCounter = 3;
  {
    const S = RUN.spec;
    if (S.battle){
      BATTLE = {
        hp: S.hp, maxHp: S.hp,
        name: S.name, mini: S.mini,
        attacks: BOSS_ATTACKS[S.name] || ["freeze", "eat"],
        next: null, counter: 2, cadence: 2, enraged: false, dmgMult: 1
      };
      BATTLE.next = BATTLE.attacks[Math.floor(Math.random() * BATTLE.attacks.length)];
      BATTLE.next2 = BATTLE.attacks[Math.floor(Math.random() * BATTLE.attacks.length)];
      if (owned[RUN.char + "2"] && RUN.char === "tietaja")
        BATTLE.hp = BATTLE.maxHp = Math.round(BATTLE.hp * 0.9);
      // tuntemattomat esineet paljastuvat taistelun alkaessa
      if (RUN.items.includes("karhuntalja")){
        setTimeout(() => consumeItem("karhuntalja"), 1400);
        BATTLE.dmgMult = 1.5;
      }
      if (RUN.items.includes("hiidenhammas")){
        setTimeout(() => consumeItem("hiidenhammas"), 2600);
        BATTLE.hp = BATTLE.maxHp = Math.round(BATTLE.hp * 0.85);
      }
      if (RUN.items.includes("tervaskanto")){
        setTimeout(() => consumeItem("tervaskanto"), 3800);
        BATTLE.skipFirst = true;
      }
      if (RUN.items.includes("noidanrumpu")){
        setTimeout(() => consumeItem("noidanrumpu"), 5000);
        moves += 4;
      }
    } else {
      BATTLE = null;
      if (charIs("kaataja")) moves = Math.max(8, moves - 2);
      if (permOwned("evaat") && RUN.stage === 1) moves += 3;
      // eväskääry paljastuu tavoitekentän alussa
      if (RUN.items.includes("evaskaary")){
        setTimeout(() => consumeItem("evaskaary"), 1400);
        moves += 3;
      }
    }
    // kohtaamisten kenttämodifikaattorit (lepo, väsymys...)
    if (RUN.nextMod){
      moves = Math.max(6, moves + (RUN.nextMod.moves || 0));
      RUN.nextMod = null;
    }
    moves = S.moves + 2 * perkCount("noppa") + (curseOn("halla") ? 3 : 0);
    collectGoals = {};
    for (const t in (S.collect || {}))
      collectGoals[t] = Math.round(S.collect[t] * (curseOn("ahneus") ? 1.25 : 1));
    dropTotal = S.drops || 0;
    parseLayout(S.layout);
    if (curseOn("halla")){
      let n = 4, g = 0;
      while (n > 0 && g++ < 100){
        const r = 1 + Math.floor(Math.random() * (ROWS - 2));
        const c = Math.floor(Math.random() * COLS);
        if (!ices[r][c]){ ices[r][c] = true; n--; }
      }
    }
  }
  dropLeft = dropTotal;

  ovBtn.textContent = "Jatka";

  specials = emptySpecials();
  // jäätyneet palat voivat harvoin tukkia kaikki siirrot – generoi silloin uusiksi
  let guard = 0;
  do {
    types = generateTypes();
    // käpykorit laudan ylälaitaan tasavälein
    for (let i = 0; i < dropTotal; i++){
      const c = Math.floor((i + 1) * COLS / (dropTotal + 1));
      types[0][c] = T_DROP;
    }
  } while (!hasValidMove(types, specials, ices) && guard++ < 100);

  // Vaellus: Karhunkaato asettaa käpälän/käpälät valmiiksi
  for (let i = 0; i < perkCount("kaato"); i++){
    const cand = [];
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (types[r][c] >= 0 && specials[r][c] === S_NONE && !ices[r][c]) cand.push({ r, c });
    if (cand.length){
      const p = cand[Math.floor(Math.random() * cand.length)];
      specials[p.r][p.c] = S_BOMB;
    }
  }

  measure();
  buildCellBackgrounds();
  buildMossEls();
  rebuildBoardDOM();
  renderGoals();
  updateCursorRing();
  updateStats();
  renderPerks();
  renderBossBar();
  boardEl.classList.remove("enrage");
  Sfx.setMood(RUN.act);
  resetIdle();
  if (BATTLE){
    showBanner((BATTLE.mini ? "" : "PÄÄPOMO: ") + BATTLE.name.toUpperCase() + "!");
    Sfx.boom();
  } else {
    showBanner(RUN.spec.name + " · " + RUN.act + "." + RUN.stage);
  }
}

/* =========================================================
   Syöte: osoitin (napautus + pyyhkäisy)
   ========================================================= */

let pointerStart = null;

function cellFromEvent(e){
  const rect = boardEl.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / tileSize);
  const r = Math.floor((e.clientY - rect.top) / tileSize);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return null;
  return { r, c };
}

boardEl.addEventListener("pointerdown", e => {
  Sfx.unlock();
  resetIdle();
  if (busy || gameOver) return;
  const cell = cellFromEvent(e);
  if (!cell) return;
  pointerStart = { cell, x: e.clientX, y: e.clientY };
  boardEl.classList.remove("kb");
});

boardEl.addEventListener("pointermove", e => {
  if (!pointerStart || busy || gameOver) return;
  const dx = e.clientX - pointerStart.x;
  const dy = e.clientY - pointerStart.y;
  const threshold = tileSize * 0.4;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < threshold) return;
  const { r, c } = pointerStart.cell;
  let target;
  if (Math.abs(dx) > Math.abs(dy)) target = { r, c: c + Math.sign(dx) };
  else                             target = { r: r + Math.sign(dy), c };
  pointerStart = null;
  if (target.r < 0 || target.r >= ROWS || target.c < 0 || target.c >= COLS) return;
  trySwap({ r, c }, target);
});

boardEl.addEventListener("pointerup", e => {
  if (!pointerStart) return;
  const cell = pointerStart.cell;
  pointerStart = null;
  if (busy || gameOver) return;
  if (selected && selected.r === cell.r && selected.c === cell.c){
    setSelected(null);
  } else if (selected && Math.abs(selected.r - cell.r) + Math.abs(selected.c - cell.c) === 1){
    trySwap(selected, cell);
  } else if (ices[cell.r][cell.c]){
    denyIce(cell);
  } else {
    Sfx.select();
    setSelected(cell);
  }
});

boardEl.addEventListener("pointercancel", () => { pointerStart = null; });

/* =========================================================
   Syöte: näppäimistö
   ========================================================= */

document.addEventListener("keydown", e => {
  Sfx.unlock();
  resetIdle();
  if (guideOverlay.classList.contains("show")){
    if (e.key === "Escape"){ e.preventDefault(); closeGuide(); }
    return;
  }
  if (draftOverlay.classList.contains("show")) return; // valinta on pakollinen
  if (encOverlay.classList.contains("show")) return;    // kohtaaminen on pakollinen
  if (invOverlay.classList.contains("show")){
    if (e.key === "Escape"){ e.preventDefault(); invOverlay.classList.remove("show"); }
    return;
  }
  if (shopOverlay.classList.contains("show")){
    if (e.key === "Escape"){
      e.preventDefault();
      shopOverlay.classList.remove("show");
      showMainMenu();
    }
    return;
  }
  if (miniOverlay.classList.contains("show")) return;   // minipeli kuuntelee itse
  if (gameOver && (e.key === "Enter" || e.key === " ")){ restartFromOverlay(); return; }
  if (busy || gameOver) return;
  const k = e.key;
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," ","Enter","Escape"].includes(k)){
    e.preventDefault();
    boardEl.classList.add("kb");
  } else return;

  if (k === "ArrowUp")    cursor.r = Math.max(0, cursor.r - 1);
  if (k === "ArrowDown")  cursor.r = Math.min(ROWS - 1, cursor.r + 1);
  if (k === "ArrowLeft")  cursor.c = Math.max(0, cursor.c - 1);
  if (k === "ArrowRight") cursor.c = Math.min(COLS - 1, cursor.c + 1);
  updateCursorRing();

  if (k === "Escape") setSelected(null);
  if (k === "Enter" || k === " "){
    const cell = { r: cursor.r, c: cursor.c };
    if (selected && selected.r === cell.r && selected.c === cell.c){
      setSelected(null);
    } else if (selected && Math.abs(selected.r - cell.r) + Math.abs(selected.c - cell.c) === 1){
      trySwap(selected, cell);
    } else if (ices[cell.r][cell.c]){
      denyIce(cell);
    } else {
      Sfx.select();
      setSelected(cell);
    }
  }
});

  <p>Kenttien välissä polku johtaa <span class="sp-name">kohtaamisiin</span>: riskivalintoja,
     vaihtokauppoja ja minipelejä – jokaisella alueella omansa (🐦 Käpylintu, 🐸 Suohyppely,
     🛷 Ahkio). Osa valinnoista aukeaa vain oikealla varusteella, ja
     ❓ <span class="sp-name">tuntemattomien esineiden</span> vaikutus paljastuu vasta,
     kun niiden hetki koittaa.</p>
  <h3>Esteet ja erikoisuudet</h3>
  <p>Alueilla on omat oikkunsa: Suossa <span class="sp-name">usva</span> peittää paloja –
     peitetyn palan laji paljastuu vasta osumasta, mutta sokkona vaihtaminenkin on sallittua.
     Pohjolassa <span class="sp-name">pyry</span> jäädyttää paloja kesken kentän muutaman
     siirron välein.</p>
  <ul>
    <li><span class="gi">${MOSS_ICON}</span><span><span class="sp-name">Sammal</span> ohenee, kun sen päällä
      oleva pala poimitaan. Tumma sammal vaatii kaksi poimintaa.</span></li>
    <li><span class="gi">${ICE_ICON}</span><span><span class="sp-name">Jäätynyttä</span> palaa ei voi siirtää.
      Ensimmäinen osuma särkee kuoren, seuraava poimii palan.</span></li>
    <li><span class="gi">${DROP_ICON}</span><span><span class="sp-name">Käpykori</span> pitää saatella pohjariville
      asti poimimalla paloja sen alta. Kori putoaa muiden mukana eikä tuhoudu.</span></li>
    <li><span class="gi">${MOSS_ICON}</span><span>Joillain kentillä sammal <span class="sp-name">leviää</span>
      viereiseen soluun aina, kun vuoro ei poimi yhtään sammalta.</span></li>
  </ul>
`;

function openGuide(){ guideOverlay.classList.add("show"); }
function closeGuide(){ guideOverlay.classList.remove("show"); }

guideBtn.addEventListener("click", () => { Sfx.unlock(); openGuide(); });
guideClose.addEventListener("click", closeGuide);
guideOverlay.addEventListener("click", e => { if (e.target === guideOverlay) closeGuide(); });

const soundBtn = document.getElementById("soundBtn");
soundBtn.addEventListener("click", () => {
  Sfx.unlock();
  const soundOn = Sfx.toggle();
  soundBtn.textContent = soundOn ? "🔊" : "🔇";
  soundBtn.setAttribute("aria-pressed", soundOn);
});

const musicBtn = document.getElementById("musicBtn");
musicBtn.addEventListener("click", () => {
  Sfx.unlock();
  const musicOn = Sfx.musicToggle();
  musicBtn.textContent = musicOn ? "🎵" : "🔕";
  musicBtn.setAttribute("aria-pressed", musicOn);
});

newGame();
</script>

<style>
  #devBtn{
    position:fixed; right:14px; bottom:14px; z-index:900;
    width:48px; height:48px; border-radius:50%;
    border:2px solid #e5b954; background:#1a2c20; color:#e5b954;
    font-size:1.3rem; cursor:pointer; box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  #devPanel{
    position:fixed; right:10px; bottom:70px; z-index:900;
    width:min(320px, 94vw); max-height:72vh; overflow-y:auto;
    background:#12201a; border:2px solid #e5b954; border-radius:12px;
    padding:12px; display:none; color:#f2edde;
    font-family:"Manrope","Segoe UI",system-ui,sans-serif; font-size:.85rem;
  }
  #devPanel.open{ display:block; }
  #devPanel h4{
    color:#e5b954; text-transform:uppercase; letter-spacing:.1em;
    font-size:.7rem; margin:12px 0 6px; border-bottom:1px solid #3a5a44;
    padding-bottom:3px;
  }
  #devPanel h4:first-child{ margin-top:0; }
  #devPanel .row{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
  #devPanel button, #devPanel select{
    font:inherit; font-size:.78rem; padding:5px 9px;
    background:#24402e; color:#f2edde; border:1px solid #3a5a44;
    border-radius:8px; cursor:pointer;
  }
  #devPanel button:hover{ border-color:#e5b954; }
  #devPanel .wide{ width:100%; }
</style>

<button id="devBtn" title="Kehittäjätyökalut">🛠</button>
<div id="devPanel"></div>

<script>
(function(){
  "use strict";
  const panel = document.getElementById("devPanel");
  document.getElementById("devBtn").addEventListener("click", () =>
    panel.classList.toggle("open"));

  function devRun(act, stage){
    RUN = {
      act, stage, char: selectedChar,
      score: 0, berries: 0,
      perks: {}, curses: {}, amulets: 3, items: [],
      spec: null, finished: false,
      sinceEnc: 0, pendingDraft: false, lastEnc: null, nextMod: null
    };
  }
  function enterField(act, stage){
    devRun(act, stage);
    RUN.spec = nextSpec();
    overlay.classList.remove("show", "menu");
    newGame();
    panel.classList.remove("open");
  }

  // --- paneelin sisältö ---
  const bossRows = ACTS.map((a, i) =>
    `<button data-boss="${i + 1},5">⚔️ ${a.miniboss}</button>` +
    `<button data-boss="${i + 1},10">👑 ${a.boss}</button>`).join("");
  const miniRows = Object.keys(MINIGAMES).map(id =>
    `<button data-mini="${id}">${MINIGAMES[id].icon} ${MINIGAMES[id].name}</button>`).join("");
  const encRows = ENCOUNTERS.map(e =>
    `<button data-enc="${e.id}">${e.icon} ${e.title}</button>`).join("");

  panel.innerHTML =
    `<h4>Kenttä</h4>
     <div class="row">
       <select id="devAct">${[1,2,3].map(a =>
         `<option value="${a}">${a}. korpi – ${ACTS[a-1].name}</option>`).join("")}</select>
       <select id="devStage">${Array.from({length:10},(_, i) =>
         `<option value="${i+1}">kenttä ${i+1}</option>`).join("")}</select>
       <button id="devGo" class="wide">Siirry kenttään</button>
     </div>
     <h4>Pomot</h4><div class="row">${bossRows}</div>
     <h4>Minipelit</h4><div class="row">${miniRows}</div>
     <h4>Kohtaamiset</h4><div class="row">${encRows}</div>
     <h4>Työkalut</h4>
     <div class="row">
       <button id="devWin">Voita kenttä</button>
       <button id="devMoves">+10 siirtoa</button>
       <button id="devPerks">Kaikki varusteet</button>
       <button id="devItem">+ esine</button>
       <button id="devBerry">+1000 🫐</button>
       <button id="devUnlock">Avaa hahmot</button>
       <button id="devWipe">Tyhjennä tallennus</button>
     </div>`;

  document.getElementById("devGo").addEventListener("click", () =>
    enterField(+document.getElementById("devAct").value,
               +document.getElementById("devStage").value));

  panel.querySelectorAll("[data-boss]").forEach(b =>
    b.addEventListener("click", () => {
      const [a, s] = b.dataset.boss.split(",").map(Number);
      enterField(a, s);
    }));

  panel.querySelectorAll("[data-mini]").forEach(b =>
    b.addEventListener("click", () => {
      const id = b.dataset.mini;
      devRun(id === "suohyppely" ? 2 : id === "ahkio" ? 3 : 1, 2);
      overlay.classList.remove("show", "menu");
      launchMinigame(id);
      panel.classList.remove("open");
    }));

  panel.querySelectorAll("[data-enc]").forEach(b =>
    b.addEventListener("click", () => {
      const enc = ENCOUNTERS.find(e => e.id === b.dataset.enc);
      devRun(enc.act || 1, 2);
      overlay.classList.remove("show", "menu");
      openEncounter(enc);
      panel.classList.remove("open");
    }));

  document.getElementById("devWin").addEventListener("click", () => {
    if (!RUN || RUN.finished) return;
    if (BATTLE){ dealBossDamage(BATTLE.hp + 999); }
    else { collectGoals = {}; mossLeft = 0; dropLeft = 0; }
    runLevelWin();
    panel.classList.remove("open");
  });
  document.getElementById("devMoves").addEventListener("click", () => {
    if (!RUN) return;
    moves += 10; updateStats();
  });
  document.getElementById("devPerks").addEventListener("click", () => {
    if (!RUN) return;
    for (const id in PERKS) RUN.perks[id] = PERKS[id].max;
    renderPerks();
  });
  document.getElementById("devItem").addEventListener("click", () => {
    if (!RUN) return;
    giveMysteryItem(); renderPerks();
  });
  document.getElementById("devBerry").addEventListener("click", () =>
    bankBerries(4000)); // /4-pankituksen läpi -> +1000
  document.getElementById("devUnlock").addEventListener("click", () => {
    unlockChar("tietaja"); unlockChar("kaataja");
    if (!RUN) showMainMenu();
  });
  document.getElementById("devWipe").addEventListener("click", () => {
    try { localStorage.removeItem("poimuri-vaellus"); } catch(e){}
    location.reload();
  });
})();
</script>

</body>
</html>
