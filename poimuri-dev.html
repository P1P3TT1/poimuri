<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>[DEV] POIMURI – marjametsän match 3</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="dev.css">
</head>
<body>

<header>
  <h1>POIMURI <span class="leaf">❦</span></h1>
  <div class="tagline">🛠 KEHITTÄJÄVERSIO – työkalut oikeasta alakulmasta</div>
</header>

<div class="stats">
  <div class="stat"><div class="label">Pisteet</div><div class="value" id="score">0</div></div>
  <div class="stat" id="movesStat"><div class="label" id="movesLabel">Siirrot</div><div class="value" id="moves">30</div></div>
  <div class="stat"><div class="label" id="bestLabel">Korpi</div><div class="value" id="best">–</div></div>
  <button class="stat inv hidden" id="invBtn" aria-label="Avaa reppu">
    <div class="label">Reppu</div><div class="value" id="invBadge">🎒</div>
  </button>
</div>

<div class="bossbar hidden" id="bossbar" aria-label="Pomon tila"></div>

<div id="hudrow">
  <div class="goals hidden" id="goals" aria-label="Tavoitteet"></div>
</div>

<div class="foresee hidden" id="foresee" aria-label="Tuleva kohtaaminen"></div>

<div class="board-wrap">
  <div class="board" id="board" aria-label="Pelilauta">
    <div class="sel-ring" id="selRing"></div>
    <div class="cursor-ring" id="curRing"></div>
    <div class="banner" id="banner"></div>
    <div class="overlay" id="overlay">
      <h2 id="ovTitle">Kori täynnä!</h2>
      <div class="final" id="ovText"></div>
      <button class="btn" id="ovBtn">Uusi retki</button>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn small" id="restartBtn">Päävalikko</button>
  <button class="btn small iconbtn" id="soundBtn" aria-pressed="true" aria-label="Äänitehosteet päälle/pois" title="Äänitehosteet">🔊</button>
  <button class="btn small iconbtn" id="musicBtn" aria-pressed="true" aria-label="Musiikki päälle/pois" title="Musiikki">🎵</button>
</div>

<button class="guide-btn" id="guideBtn" aria-label="Avaa Poimijan opas">
    <span class="book-spine"></span>
    <span class="book-face"><span class="book-band"></span>Poimijan<br>opas<span class="book-leaf">❦</span></span>
  </button>

<div class="guide-overlay" id="draftOverlay" role="dialog" aria-modal="true" aria-label="Varustevalinta">
  <div class="draft-paper">
    <h2>Valitse varuste</h2>
    <div class="cards" id="draftCards"></div>
  </div>
</div>

<div class="guide-overlay" id="shopOverlay" role="dialog" aria-modal="true" aria-label="Aitta">
  <div class="draft-paper shop-paper">
    <h2>Aitta</h2>
    <div class="shop-balance" id="shopBalance"></div>
    <div id="shopBody"></div>
    <button class="btn small guide-close" id="shopClose">Takaisin</button>
  </div>
</div>

<div class="guide-overlay" id="invOverlay" role="dialog" aria-modal="true" aria-label="Reppu">
  <div class="draft-paper shop-paper">
    <h2>Reppu</h2>
    <div id="invBody"></div>
    <button class="btn small guide-close" id="invClose">Takaisin</button>
  </div>
</div>

<div class="guide-overlay" id="encOverlay" role="dialog" aria-modal="true" aria-label="Kohtaaminen">
  <div class="draft-paper"><div id="encBody"></div></div>
</div>

<div class="guide-overlay" id="miniOverlay" role="dialog" aria-modal="true" aria-label="Minipeli">
  <div class="mini-wrap">
    <canvas id="miniCanvas" width="360" height="540"></canvas>
    <div class="mini-result hidden" id="miniResult"></div>
  </div>
</div>

<div class="guide-overlay" id="guideOverlay" role="dialog" aria-modal="true" aria-label="Poimijan opas">
  <div class="guide">
    <div class="guide-paper">
      <h2>POIMIJAN OPAS <span class="leaf">❦</span></h2>
      <div id="guideBody"></div>
      <button class="btn small guide-close" id="guideClose">Takaisin metsään</button>
    </div>
  </div>
</div>

<script src="game.js"></script>

<button id="devBtn" title="Kehittäjätyökalut">🛠</button>
<div id="devPanel"></div>
<script src="dev.js"></script>
</body>
</html>
